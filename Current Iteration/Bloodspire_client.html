async function uploadAllTeams() {
  const lg  = S.league;
  if (!lg.url || !lg.managerId) { setMsg('Configure league settings first (Action → League Settings).', 'err'); return; }

  // Get team IDs from account, filtered by Run This Turn checkbox
  // Default is true — if checkbox state is unknown, include the team
  const accountIds = S.account?.team_ids || [];
  const ids = accountIds.filter(tid => S.runNextTurn[tid] !== false);
  if (!ids.length) {
    setMsg('No teams are checked for "Run This Turn". Check the box on the team panel.', 'err');
    return;
  }

  const pw = lg.password || prompt('League password:');
  if (!pw) return;
  lg.password = pw;

  setMsg(`Uploading ${ids.length} team(s) to league server...`, 'ok'); render();

  // Build dynamic step list — one entry per team, based on the local team name
  const steps = ids.map(tid => {
    const t = S.teams?.[tid];
    const nm = (t && t.team_name) ? t.team_name : `Team ${tid}`;
    return `Uploading ${nm}`;
  });
  _showUploadProgress(steps, 0, null);
  const tick = (i) => _showUploadProgress(steps, i, null);

  const uploaded = [];
  const errors   = [];

  for (let i = 0; i < ids.length; i++) {
    tick(i);
    const tid = ids[i];
    let r;
    try {
      r = await API.post('/api/league/upload_one', {
        team_id          : tid,
        league_url       : lg.url,
        league_manager_id: lg.managerId,
        password         : pw,
      });
    } catch(e) {
      r = { success: false, team_id: tid, error: e.message };
    }
    if (r.success) {
      uploaded.push({ team_id: tid, team_name: r.team_name || `Team ${tid}` });
    } else {
      errors.push({ team_id: tid, team_name: r.team_name || `Team ${tid}`,
                    error: r.error || 'unknown error' });
    }
    await new Promise(res => setTimeout(res, 30));
  }

  // Close progress modal — the detailed results modal below supersedes it
  _showUploadProgress(steps, steps.length, null);
  setTimeout(() => {
    const m = document.getElementById('ul-progress-modal');
    if (m) m.remove();
  }, 400);

  // Show results modal
  const old = document.getElementById('upload-results-modal');
  if (old) old.remove();
  const modal = document.createElement('div');
  modal.id = 'upload-results-modal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:8000;display:flex;align-items:center;justify-content:center;';
  const successRows = uploaded.map(t => `<tr><td style="padding:2px 8px;">✓</td><td style="padding:2px 8px;">${esc(t.team_name)}</td><td style="padding:2px 8px; color:#060;">Uploaded</td></tr>`).join('');
  const errorRows   = errors.map(e => `<tr><td style="padding:2px 8px; color:#c00;">✗</td><td style="padding:2px 8px;">${esc(e.team_name||'Team '+e.team_id)}</td><td style="padding:2px 8px; color:#c00;">${esc(e.error)}</td></tr>`).join('');
  const hasErrors   = errors.length > 0;
  const notFound    = errors.some(e => (e.error||'').toLowerCase().includes('manager not found'));
  modal.innerHTML = `
    <div style="background:var(--bg);border:2px solid ${hasErrors?'#c00':'#080'};border-radius:6px;padding:16px;min-width:320px;max-width:500px;box-shadow:0 4px 16px rgba(0,0,0,.4);">
      <div style="font-weight:bold; font-size:13px; margin-bottom:10px; color:${hasErrors&&!uploaded.length?'#c00':'#060'};">
        ${uploaded.length ? `✓ ${uploaded.length} team${uploaded.length===1?'':'s'} uploaded successfully` : '✗ No teams were uploaded'}
        ${hasErrors ? ` &nbsp;·&nbsp; <span style="color:#c00;">${errors.length} error${errors.length===1?'':'s'}</span>` : ''}
      </div>
      ${uploaded.length||errors.length ? `
      <table style="width:100%; border-collapse:collapse; font-size:11px; margin-bottom:12px;">
        ${successRows}${errorRows}
      </table>` : ''}
      ${notFound ? `
      <div style="font-size:11px;background:#fff0f0;border:1px solid #e08080;border-radius:4px;padding:8px 10px;margin-bottom:12px;line-height:1.6;">
        <strong>Manager not recognized by the server.</strong><br>
        This usually happens after the league arena is reset — the server loses its manager registrations.
        Open League Settings, enter your password, and click <em>Re-register</em> to get a new ID, then upload again.
      </div>` : ''}
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        ${notFound ? `<button onclick="document.getElementById('upload-results-modal').remove();showLeagueSettings()">Open League Settings</button>` : ''}
        <button onclick="document.getElementById('upload-results-modal').remove()">Close</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  setMsg(
    uploaded.length
      ? `✓ Uploaded ${uploaded.length} team(s) to league`
      : `No teams uploaded.`,
    hasErrors ? 'err' : 'ok'
  );
  render();
}

/* ============================================================
   INITIALISATION
   ============================================================ */
async function init() {
  if (!isChromiumWithFSA()) { renderChromiumError(); return; }

  // 1. Check if we are running from a local server that handles storage (Zero-Click Mode)
  let localCheck = {};
  try {
    // Try current origin first (normal deployment or served by local server)
    localCheck = await fetch('/api/local/status').then(r => r.json()).catch(() => ({ success: false }));
    // Fallback for file:// or cross-origin: check standard local server port
    if (!localCheck.success && (window.location.protocol === 'file:' || window.location.hostname === 'localhost')) {
        localCheck = await fetch('http://localhost:8766/api/local/status').then(r => r.json()).catch(() => ({ success: false }));
    }

    if (localCheck.success && localCheck.is_local_backend) {
      S.isLocalBackend = true;
      S.folderReady    = true;
      S.localBaseUrl   = localCheck.server_url || 'http://localhost:8766';
      if (!S.serverUrl || S.serverUrl === DEFAULT_SERVER_URL) S.serverUrl = S.localBaseUrl;
      
      // Load metadata from server-managed store
      const localAcc = await LocalAPI.get('/api/account');
      if (localAcc.success) {
          S.savedManagerName = localAcc.account.manager_name;
          S.savedRememberMe  = localAcc.account.remember !== false;
          S.savedPassword    = localAcc.account.password_plaintext || '';
          S.loginTab         = 'login';
      }
      
      // If we have a local backend, skip the folder picker entirely
      S.view = 'login';
      render();
      return;
    }
  } catch(e) { console.debug('Local backend check failed', e); }

  // 2. Browser FSA flow: Load persistent metadata (independent of folder)
  const meta = await idbGet('clientMeta') || {};
  if (meta.managerName) S.savedManagerName = meta.managerName;
  if (meta.serverUrl)   S.serverUrl = meta.serverUrl;
  if (meta.rememberMe !== undefined) S.savedRememberMe = meta.rememberMe;
  if (meta.password)    S.savedPassword = meta.password;

  // 3. Try to reconnect folder handle
  let handle = await idbGet('folderHandle');
  if (handle) {
    try {
      const state = await handle.queryPermission({ mode: 'readwrite' });
      if (state === 'granted') {
        S.folderHandle = handle;
        S.folderReady  = true;
        await _bootstrapFromFolder();
        return;
      }
    } catch (e) { console.warn('Handle query failed', e); }
    S._hadPriorFolder = true;
  }

  // If we remember the manager, go straight to login (seamless experience)
  if (S.savedManagerName) {
    S.view = 'login';
  } else {
    S.view = 'folder_pick';
  }
  render();
}

// Shared bootstrap path used by both the silent auto-resume and the explicit
// folder-pick flow. Loads settings.json, caches game_data, and lands the user
// on the login screen (or auto-login if remembered credentials are present).
async function _bootstrapFromFolder() {
  const settings = await Store.readSettings();
  if (settings.server_url) S.serverUrl = settings.server_url;
  try {
    const gd = await API.get('/api/game_data');
    if (gd && !gd.error) S.gd = gd;
  } catch (e) { /* offline — UI uses cached data */ }
  const acc = await Store.readAccount();
  if (acc && acc.manager_name) {
    S.savedManagerName = acc.manager_name;
    S.savedPassword    = acc.password_plaintext || null;
    S.savedRememberMe  = acc.remember !== false;
    S.loginTab = 'login';
  } else {
    S.loginTab = 'new';
  }
  const lg = await API.get('/api/league_settings');
  if (lg) {
    S.league.url          = lg.url          || S.serverUrl;
    S.league.managerId    = lg.managerId    || '';
    S.league.managerName  = lg.managerName  || '';
    S.league.password     = lg.password     || '';
    S.league.lastUpload   = lg.lastUpload   || '';
    S.league.lastDownload = lg.lastDownload || '';
    S.league.lastTurnRan  = lg.lastTurnRan  || 0;
  }
  S.view = 'login'; S.msg = '';
  render();
}

// Global one-time listener — close the Action dropdown on any click.
document.addEventListener('click', () => {
  const dd = el('action-dropdown');
  if (dd) dd.style.display = 'none';
});

init();
</script>
