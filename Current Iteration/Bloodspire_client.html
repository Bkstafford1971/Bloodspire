<html lang="en">
<head>

<title>BLOODSPIRE Client - v1.2</title>
<style>
/* ============================================================
   WINDOWS CLASSIC — REFINED
   ============================================================ */
:root {
  --bg:       #d4d0c8;
  --white:    #ffffff;
  --lt-gray:  #e4e0d8;
  --mid:      #808080;
  --dark:     #404040;
  --title:    #000080;
  --title-tx: #ffffff;
  --sel:      #000080;
  --sel-tx:   #ffffff;
  --font:     'Segoe UI', 'Tahoma', 'Arial', sans-serif;
  --fs:       12px;
  --input-bg: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: var(--bg); font-family: var(--font); font-size: var(--fs); color: #000; user-select: none; overflow: hidden; }
#app { width:100%; height:100%; display:flex; flex-direction:column; }
a { color: inherit; text-decoration: none; }

/* Borders */
.r { border: 2px solid; border-color: var(--white) var(--mid) var(--mid) var(--white); }
.s { border: 2px solid; border-color: var(--mid) var(--white) var(--white) var(--mid); }
.flat { border: 1px solid var(--mid); }

/* Buttons */
button {
  background: var(--bg); border: 2px solid;
  border-color: var(--white) var(--mid) var(--mid) var(--white);
  padding: 3px 14px; font: var(--fs) var(--font);
  cursor: default; min-width: 72px; color: #000;
}
button:active { border-color: var(--mid) var(--white) var(--white) var(--mid); padding: 4px 13px 2px 15px; }
button:disabled { color: var(--mid); }
button.sm { min-width: 28px; padding: 1px 6px; font-size: 11px; }
button.wide { min-width: 120px; }

/* Inputs + Selects */
input[type=text], input[type=password], input[type=email], input[type=number] {
  background: var(--input-bg); border: 2px solid;
  border-color: var(--mid) var(--white) var(--white) var(--mid);
  padding: 2px 5px; font: var(--fs) var(--font); color: #000; outline: none;
}
input[type=text]:focus, input[type=password]:focus, input[type=email]:focus { border-color: var(--mid) var(--white) var(--white) var(--mid); }
input.ro { background: var(--bg); cursor: default; }
select {
  background: var(--input-bg); border: 2px solid;
  border-color: var(--mid) var(--white) var(--white) var(--mid);
  padding: 1px 2px; font: var(--fs) var(--font); color: #000; cursor: default;
  appearance: auto;
}
input[type=number] { width: 44px; text-align: center; }

/* Title bar */
.title-bar {
  background: var(--title); color: var(--title-tx); font-weight: bold;
  padding: 4px 8px; display: flex; align-items: center; gap: 6px; font-size: 12px;
  letter-spacing: 0.2px;
}
.title-bar-btns { margin-left: auto; display: flex; gap: 2px; }
.title-btn {
  width: 16px; height: 14px; line-height: 12px; text-align: center;
  background: var(--bg); border: 1px solid var(--mid); font-size: 9px;
  color: #000; padding: 0; min-width: 0; cursor: default;
}

/* Tabs */
.tabs { display: flex; padding: 4px 6px 0; gap: 2px; }
.tab {
  padding: 4px 16px 3px; cursor: default; position: relative; bottom: -2px;
  background: var(--bg); border: 2px solid;
  border-color: var(--white) var(--mid) var(--bg) var(--white);
  font: var(--fs) var(--font); z-index: 1;
}
.tab:not(.active) { background: #bbb8b0; bottom: 0; padding-top: 3px; border-bottom-color: var(--mid); color: #333; }
.tab.tab-disabled  { color: var(--mid); pointer-events: none; font-style: italic; }
.tab-body { border: 2px solid; border-color: var(--mid) var(--white) var(--white) var(--mid); padding: 10px; background: var(--bg); }
.tab-content { display: none; } .tab-content.active { display: block; }

/* Group boxes */
.group {
  border: 2px solid var(--mid); margin: 6px 4px 4px; padding: 10px 8px 6px;
  position: relative; background: var(--bg);
}
.group-label {
  position: absolute; top: -9px; left: 8px;
  background: var(--bg); padding: 0 4px; font-weight: bold; font-size: 11px;
}

/* Tables */
table.grid { border-collapse: collapse; width: 100%; }
table.grid th {
  background: var(--bg); border: 1px solid var(--mid);
  padding: 3px 6px; text-align: center; font-weight: bold; font-size: 11px; white-space: nowrap;
}

  border: 1px solid var(--mid); padding: 2px 5px;

}
table.grid tr.sel td { background: var(--sel); color: var(--sel-tx); }
table.grid tr:not(.sel):hover td { background: #e0ddd6; }
table.grid tr.sel td input, table.grid tr.sel td select { background: var(--sel); color: var(--sel-tx); }

/* Tree */

  width: 280px; min-width: 280px; overflow-y: auto; overflow-x: hidden;
  border-right: 2px solid; border-color: var(--mid) var(--white) var(--white) var(--mid);
  background: var(--input-bg); padding: 2px 0;
}
.tree-row {
  display: flex; align-items: center; padding: 2px 4px; cursor: default; white-space: nowrap;
}
.tree-row:hover { background: #e8e4dc; }
.tree-row.sel { background: var(--sel); color: var(--sel-tx); }
.tree-row.sel img, .tree-row.sel .ico { filter: invert(100%); }
.tree-row.sel .tree-lbl { color: var(--sel-tx); }
.tree-row.sel .tree-lbl span { color: var(--sel-tx) !important; }
.tree-exp { width: 14px; font-size: 9px; text-align: center; flex-shrink: 0; }
.tree-ico { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; margin-right: 3px; }
.tree-lbl { font-size: 12px; }
.tree-mgr { font-weight: bold; }

/* Menu bar */
#menu-bar { background: var(--bg); border-bottom: 1px solid var(--mid); display: flex; padding: 1px 4px; gap: 0; }
.menu-item { padding: 3px 10px; cursor: default; font-size: 12px; }
.menu-item:hover { background: var(--sel); color: var(--sel-tx); }

/* Main layout */
#app { display: flex; flex-direction: column; height: 100vh; }
#main-body { display: flex; flex: 1; overflow: hidden; }
#content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px; }

/* Panels */
.panel-label { font-weight: bold; margin-bottom: 5px; font-size: 12px; }
.field-row { display: flex; align-items: center; margin-bottom: 5px; gap: 5px; }
.field-lbl { min-width: 80px; text-align: right; }
.field-val { background: var(--input-bg); border: 2px solid; border-color: var(--mid) var(--white) var(--white) var(--mid); padding: 1px 5px; font: var(--fs) var(--font); }

/* Warrior stat view */
.stat-val { display: inline-block; min-width: 70px; padding: 1px 5px; background: var(--input-bg); border: 2px solid; border-color: var(--mid) var(--white) var(--white) var(--mid); }
.strat-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
.strat-table th { background: var(--bg); border: 1px solid var(--mid); padding: 3px 5px; font-weight: bold; text-align: left; font-size: 11px; }
.strat-table td { border: 1px solid var(--mid); padding: 1px 3px; }
.strat-table .row-num { width: 18px; text-align: center; font-weight: bold; }
.strat-table select { border: none; background: transparent; padding: 0; width: 100%; font: var(--fs) var(--font); }
.strat-table input[type=number] { border: none; background: transparent; width: 30px; }

/* Skills / Injuries panels */
.text-panel { background: var(--input-bg); border: 2px solid; border-color: var(--mid) var(--white) var(--white) var(--mid); padding: 5px 7px; height: 120px; overflow-y: auto; font-size: 12px; line-height: 1.6; }

/* Login dialog */
#login-dialog {
  width: 420px; background: var(--bg); position: absolute;
  top: 80px; left: 50%; transform: translateX(-50%);
  border: 2px solid var(--mid); box-shadow: 3px 3px 0 var(--dark);
}
.form-grid { display: grid; grid-template-columns: 130px 1fr; gap: 5px 8px; align-items: center; padding: 10px; }
.form-grid label { text-align: right; }
.form-grid input { width: 100%; }
.btn-row { display: flex; gap: 6px; padding: 8px 10px; justify-content: flex-end; border-top: 1px solid var(--mid); }

/* Team creation */
#ct-dialog { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 6px; padding: 4px; overflow-y: auto; }
.stat-spin { display: flex; align-items: center; gap: 3px; }
.stat-spin input { width: 50px; text-align: center; }

/* Status / error messages */
.msg { padding: 5px 8px; margin: 4px 0; font-size: 12px; }
.msg.err { background: #fdd; border: 1px solid #c00; color: #800; }
.msg.ok  { background: #dfd; border: 1px solid #080; color: #040; }

/* Points counter */
.pts-box { background: var(--input-bg); border: 2px solid; border-color: var(--mid) var(--white) var(--white) var(--mid); padding: 4px 12px; font-size: 13px; font-weight: bold; text-align: center; min-width: 50px; }

/* Divider */
.vsep { width: 6px; border-left: 2px solid; border-color: var(--mid) var(--white); margin: 0 4px; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 14px; height: 14px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg); border: 2px solid; border-color: var(--white) var(--mid) var(--mid) var(--white); }
::-webkit-scrollbar-button { background: var(--bg); border: 2px solid; border-color: var(--white) var(--mid) var(--mid) var(--white); height: 14px; width: 14px; }

/* Narrative overlay styling */
.nar-sep       { border-top:2px solid #aaa; margin:8px 0; }
.nar-row       { display:flex; align-items:baseline; font-family:'Courier New',monospace; margin:1px 0; }
.nar-col-l     { flex:1; }
.nar-col-vs    { flex:0 0 48px; text-align:center; color:#555; font-size:15px; font-weight:bold; align-self:center; }
.nar-col-r     { flex:1; font-size:12px; color:#333; }
.nar-wname     { font-weight:bold; font-size:15px; color:#000; }
.nar-wrec      { color:#555; font-size:12px; }
.nar-prose     { font-family:'Courier New',monospace; font-size:12px; line-height:1.5; margin:1px 0; color:#000; }
/* Strategy table */
.nar-strat-tbl           { width:100%; border-collapse:collapse; font-family:'Courier New',monospace; font-size:11px; margin:6px 0; }
.nar-strat-tbl thead tr  { border-bottom:1px solid #aaa; }
.nar-strat-tbl th        { font-weight:bold; text-align:left; padding:3px 10px 3px 0; color:#000; }
.nar-strat-tbl td        { text-align:left; padding:2px 10px 2px 0; color:#000; }
.nar-st-trig             { width:40%; }
.nar-st-style            { width:18%; }
.nar-st-level                   { width:7%; }
.nar-strat-tbl th.nar-st-level  { text-align:center; padding-left:0 !important; padding-right:0 !important; }
.nar-strat-tbl td.nar-st-level  { text-align:center; padding-left:0 !important; padding-right:0 !important; }
.nar-st-aim              { width:17%; }
/* Narrative section */
.nar-event    { color:#c60; font-weight:bold; margin:4px 0; font-family:'Courier New',monospace; }
.nar-minute   { color:#a80; font-weight:bold; margin-top:6px; font-family:'Courier New',monospace; }

.nar-line     { font-family:'Courier New',monospace; font-size:12px; line-height:1.5; color:#000; }
.nar-damage-light  { font-family:'Courier New',monospace; font-size:12px; line-height:1.5; color:#1a6b1a; padding-left:1.8em; }

.nar-damage-heavy  { font-family:'Courier New',monospace; font-size:12px; line-height:1.5; color:#8b0000; padding-left:1.8em; }

<div id="app"></div>

<script>
"use strict";
/* ============================================================
   STANDALONE CLIENT CONFIG
   ============================================================ */
// Default league server URL. Overridable via Action → Account Settings,
// which persists the override to the user's local settings.json.
const DEFAULT_SERVER_URL = "http://100.114.138.61:8766";

/* ============================================================
   CHROMIUM GATE — File System Access API is Chromium-only
   ============================================================ */
function isChromiumWithFSA() {
  return typeof window !== 'undefined'
      && typeof window.showDirectoryPicker === 'function';
}
function renderChromiumError() {
  document.getElementById('app').innerHTML = `
<div style="background:#d4d0c8;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border:2px solid #808080;padding:24px 32px;max-width:520px;box-shadow:2px 2px 0 #404040;">
    <div style="font-size:16px;font-weight:bold;margin-bottom:12px;">Unsupported browser</div>
    <p style="font-size:13px;line-height:1.5;margin-bottom:10px;">
      BLOODSPIRE requires <b>Chrome, Edge, or Brave</b> (or another Chromium-based browser)
      because it needs the File System Access API to save your teams to a folder on your computer.
    </p>
    <p style="font-size:13px;line-height:1.5;margin-bottom:10px;">
      Firefox and Safari do not currently support this API. Please reopen
      <code>Bloodspire_client.html</code> in a supported browser.
    </p>
  </div>
</div>`;
}

/* ============================================================
   INDEXEDDB — persist the folder handle between sessions
   ============================================================ */
const IDB_NAME  = 'bloodspire';
const IDB_STORE = 'handles';
function _openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
async function idbGet(key) {
  const db = await _openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const rq = tx.objectStore(IDB_STORE).get(key);
    rq.onsuccess = () => resolve(rq.result);
    rq.onerror   = () => reject(rq.error);
  });
}
async function idbSet(key, val) {
  const db = await _openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}
async function idbUpdateMeta(obj) {
  const meta = await idbGet('clientMeta') || {};
  Object.assign(meta, obj);
  await idbSet('clientMeta', meta);
}

/* ============================================================
   FILE SYSTEM ACCESS API helpers
   ============================================================ */
async function fsaVerifyPermission(handle, mode = 'readwrite') {
  const opts = { mode };
  if ((await handle.queryPermission(opts)) === 'granted') return true;
  if ((await handle.requestPermission(opts)) === 'granted') return true;
  return false;
}
async function fsaPickFolder() {
  const h = await window.showDirectoryPicker({ mode: 'readwrite' });
  await idbSet('folderHandle', h);
  return h;
}
async function fsaGetOrPickFolder() {
  let h = await idbGet('folderHandle');
  if (h) {
    if (await fsaVerifyPermission(h)) return h;
  }
  h = await fsaPickFolder();
  if (!(await fsaVerifyPermission(h))) throw new Error('Folder permission denied.');
  return h;
}
async function _fsaGetDir(root, parts, create = false) {
  let cur = root;
  for (const part of parts) {
    cur = await cur.getDirectoryHandle(part, { create });
  }
  return cur;
}
async function fsaWriteJSON(relPath, obj) {
  if (S.isLocalBackend) {
    const r = await _remoteFetch('POST', '/api/local/write', { path: relPath, data: obj }, S.localBaseUrl);
    if (!r.success) throw new Error(r.error || 'Server write failed');
    return;
  }
  const root = S.folderHandle;
  if (!root) throw new Error('No folder selected.');
  const parts = relPath.split('/').filter(Boolean);
  const fname = parts.pop();
  const dir   = await _fsaGetDir(root, parts, true);
  const fh    = await dir.getFileHandle(fname, { create: true });
  const w     = await fh.createWritable();
  await w.write(JSON.stringify(obj, null, 2));
  await w.close();
}
async function fsaWriteText(relPath, text) {
  if (S.isLocalBackend) {
    const r = await _remoteFetch('POST', '/api/local/write', { path: relPath, text: text }, S.localBaseUrl);
    if (!r.success) throw new Error(r.error || 'Server write failed');
    return;
  }
  const root = S.folderHandle;
  if (!root) throw new Error('No folder selected.');
  const parts = relPath.split('/').filter(Boolean);
  const fname = parts.pop();
  const dir   = await _fsaGetDir(root, parts, true);
  const fh    = await dir.getFileHandle(fname, { create: true });
  const w     = await fh.createWritable();
  await w.write(text);
  await w.close();
}
async function fsaReadJSON(relPath) {
  if (S.isLocalBackend) {
    const r = await _remoteFetch('GET', `/api/local/read?path=${encodeURIComponent(relPath)}`, undefined, S.localBaseUrl);
    if (r.success) return r.data;
    return null;
  }
  const root = S.folderHandle;
  if (!root) return null;
  const parts = relPath.split('/').filter(Boolean);
  const fname = parts.pop();
  try {
    const dir = await _fsaGetDir(root, parts, false);
    const fh  = await dir.getFileHandle(fname);
    const f   = await fh.getFile();
    return JSON.parse(await f.text());
  } catch (e) {
    if (e.name === 'NotFoundError') return null;
    throw e;
  }
}
async function fsaReadText(relPath) {
  if (S.isLocalBackend) {
    const r = await _remoteFetch('GET', `/api/local/read?path=${encodeURIComponent(relPath)}`, undefined, S.localBaseUrl);
    if (r.success) return r.text;
    return null;
  }
  const root = S.folderHandle;
  if (!root) return null;
  const parts = relPath.split('/').filter(Boolean);
  const fname = parts.pop();
  try {
    const dir = await _fsaGetDir(root, parts, false);
    const fh  = await dir.getFileHandle(fname);
    const f   = await fh.getFile();
    return await f.text();
  } catch (e) {
    if (e.name === 'NotFoundError') return null;
    throw e;
  }
}
async function fsaDeleteFile(relPath) {
  if (S.isLocalBackend) {
    await _remoteFetch('POST', '/api/local/delete', { path: relPath }, S.localBaseUrl);
    return;
  }
  const root = S.folderHandle;
  if (!root) return;
  const parts = relPath.split('/').filter(Boolean);
  const fname = parts.pop();
  try {
    const dir = await _fsaGetDir(root, parts, false);
    await dir.removeEntry(fname);
  } catch (e) { /* already gone */ }
}
async function fsaListDir(relPath) {
  if (S.isLocalBackend) {
    const r = await _remoteFetch('GET', `/api/local/list?path=${encodeURIComponent(relPath)}`, undefined, S.localBaseUrl);
    return r.success ? r.files : [];
  }
  const root = S.folderHandle;
  if (!root) return [];
  const parts = relPath.split('/').filter(Boolean);
  const names = [];
  try {
    const dir = await _fsaGetDir(root, parts, false);
    for await (const [name, handle] of dir.entries()) {
      if (handle.kind === 'file') names.push(name);
    }
  } catch (e) { /* folder missing */ }
  return names;
}

/* ============================================================
   STORE — the FSA-backed persistence layer
   ============================================================ */
function _teamPath(tid) {
  const pad = String(tid).padStart(4, '0');
  return `teams/team_${pad}.json`;
}
function _newsletterPath(turn) {
  const pad = String(turn).padStart(4, '0');
  return `newsletters/turn_${pad}.txt`;
}
function _turnResultPath(turn) {
  const pad = String(turn).padStart(4, '0');
  return `turn_results/turn_${pad}.json`;
}
const Store = {
  async readAccount()       { return await fsaReadJSON('account.json'); },
  async writeAccount(obj)   { return await fsaWriteJSON('account.json', obj); },
  async readSettings()      { return (await fsaReadJSON('settings.json')) || {}; },
  async writeSettings(obj)  { return await fsaWriteJSON('settings.json', obj); },
  async readGameData()      { return await fsaReadJSON('game_data.json'); },
  async writeGameData(obj)  { return await fsaWriteJSON('game_data.json', obj); },
  async readTeam(tid)       { return await fsaReadJSON(_teamPath(tid)); },
  async writeTeam(team)     { return await fsaWriteJSON(_teamPath(team.team_id), team); },
  async deleteTeam(tid)     { return await fsaDeleteFile(_teamPath(tid)); },
  async listTeamIds() {
    const names = await fsaListDir('teams');
    const ids = [];
    for (const n of names) {
      const m = n.match(/^team_(\d+)\.json$/);
      if (m) ids.push(parseInt(m[1], 10));
    }
    return ids.sort((a, b) => a - b);
  },
  async listNewsletterTurns() {
    const names = await fsaListDir('newsletters');
    const turns = [];
    for (const n of names) {
      const m = n.match(/^turn_(\d+)\.txt$/);
      if (m) turns.push(parseInt(m[1], 10));
    }
    return turns.sort((a, b) => a - b);
  },
  async readNewsletter(turn) { return await fsaReadText(_newsletterPath(turn)); },
  async writeNewsletter(turn, text) { return await fsaWriteText(_newsletterPath(turn), text); },
  async writeTurnResult(turn, obj)  { return await fsaWriteJSON(_turnResultPath(turn), obj); },
  async listArchivedTeamIds() {
    const names = await fsaListDir('archives');
    const ids = [];
    for (const n of names) {
      const m = n.match(/^team_(\d+)\.json$/);
      if (m) ids.push(parseInt(m[1], 10));
    }
    return ids.sort((a, b) => a - b);
  },
  async readArchivedTeam(tid) {
    return await fsaReadJSON(`archives/team_${String(tid).padStart(4,'0')}.json`);
  },
};

/* ============================================================
   CRYPTO — client-side SHA-256 for password hashing
   ============================================================ */
async function sha256Hex(str) {
  const buf = new TextEncoder().encode(str);
  const dig = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(dig))
              .map(b => b.toString(16).padStart(2, '0')).join('');
}
function randomHex(nBytes) {
  const a = new Uint8Array(nBytes);
  crypto.getRandomValues(a);
  return Array.from(a).map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ============================================================
   MERGE RESULTS — port of gui_server._apply_league_results (JS)
   ============================================================ */
function mergeResults(localTeam, serverResult) {
  const serverTeam     = serverResult.team || {};
  const serverWarriors = serverTeam.warriors || [];
  const out = JSON.parse(JSON.stringify(localTeam));

  for (let idx = 0; idx < serverWarriors.length && idx < out.warriors.length; idx++) {
    const sw = serverWarriors[idx];
    if (!sw) continue;
    const lw = out.warriors[idx];
    if (!lw) { out.warriors[idx] = sw; continue; }

    // Authoritative from server
    lw.wins          = sw.wins          ?? lw.wins;
    lw.losses        = sw.losses        ?? lw.losses;
    lw.kills         = sw.kills         ?? lw.kills;
    lw.total_fights  = sw.total_fights  ?? lw.total_fights;
    lw.popularity    = sw.popularity    ?? lw.popularity;
    const minRec = (sw.wins||0) + (sw.losses||0);
    lw.recognition = Math.max(lw.recognition||0, sw.recognition||0, minRec);
    lw.streak        = sw.streak        ?? lw.streak;
    lw.turns_active  = sw.turns_active  ?? lw.turns_active;
    lw.injuries      = sw.injuries      ?? lw.injuries;
    lw.is_dead       = sw.is_dead       ?? lw.is_dead;
    lw.killed_by     = sw.killed_by     ?? lw.killed_by;
    lw.ascended_to_monster = sw.ascended_to_monster ?? lw.ascended_to_monster ?? false;
    lw.monster_kills = sw.monster_kills ?? lw.monster_kills ?? 0;
    if (sw.favorite_weapon) lw.favorite_weapon = sw.favorite_weapon;

    // Skills — max-merge so local gains aren't lost
    lw.skills = lw.skills || {};
    for (const [k, v] of Object.entries(sw.skills || {})) {
      if ((v||0) > (lw.skills[k]||0)) lw.skills[k] = v;
    }

    // Attribute gains — server-authoritative (training ran there)
    lw.attribute_gains = sw.attribute_gains ?? lw.attribute_gains;

    // Raw attributes — take server value if higher (training raised them)
    for (const attr of ['strength','dexterity','constitution','intelligence','presence']) {
      if (sw[attr] != null && sw[attr] > (lw[attr]||0)) lw[attr] = sw[attr];
    }

    // Fight history — replace any local entries for turns the server ran
    const srcHistory = sw.fight_history || [];
    if (srcHistory.length) {
      const srcTurns = new Set(srcHistory.map(e => e.turn).filter(Boolean));
      lw.fight_history = (lw.fight_history || []).filter(e => !srcTurns.has(e.turn));
      lw.fight_history.push(...srcHistory);
    }

    // Preserve local user-set: trains, strategies, gear, initial_stats, blood_cry
  }

  // Team turn_history — append any new entries by turn number
  out.turn_history = out.turn_history || [];
  const known = new Set(out.turn_history.map(e => e.turn));
  for (const entry of (serverTeam.turn_history || [])) {
    if (entry.turn && !known.has(entry.turn)) {
      out.turn_history.push(entry);
      known.add(entry.turn);
    }
  }

  return out;
}

/* ============================================================
   API — dual-layer router
   ============================================================
   Calls to league-server endpoints use the configured S.serverUrl.
   Calls that used to hit gui_server are now handled locally by the
   LocalAPI table, which talks to the FSA-backed Store.

   Call sites in the rest of the file continue to use the same
   path strings they used against gui_server, so most UI code is
   untouched — only the routing changes. */

// Paths that are still served by the league server (remote). Everything
// else routed through API.* is handled locally via LocalAPI.
const REMOTE_GETS  = new Set([
  '/api/game_data',
  '/api/flags',
  '/api/status',
  '/api/standings',
  '/api/fight_log',
  '/api/latest_newsletter',
  '/api/progress',
]);
// Note: /api/newsletter?turn=N is intentionally NOT in REMOTE_GETS. It
// reads the local FSA cache written by doLeagueDownloadAll — that way
// users can still open old newsletters offline. The live download from
// the league server happens inline in doLeagueDownloadAll via direct fetch.
// Note: /api/rollup and /api/rollup_single are *POST* endpoints on the
// league server but older call sites use API.get(). The translator in
// API.get() below sends them as POSTs — do not add them to REMOTE_GETS
// or the GET branch will intercept first and the server returns 404.
const REMOTE_POSTS = new Set([
  '/api/check_manager_name',
  '/api/register',
  '/api/team/create',
  '/api/upload',
]);

function _splitPath(pathWithQs) {
  const i = pathWithQs.indexOf('?');
  if (i < 0) return [pathWithQs, ''];
  return [pathWithQs.slice(0, i), pathWithQs.slice(i + 1)];
}
function _parseQS(qs) {
  const out = {};
  if (!qs) return out;
  for (const part of qs.split('&')) {
    if (!part) continue;
    const eq = part.indexOf('=');
    if (eq < 0) out[decodeURIComponent(part)] = '';
    else out[decodeURIComponent(part.slice(0, eq))] = decodeURIComponent(part.slice(eq + 1));
  }
  return out;
}
async function _remoteFetch(method, path, body, overrideBase) {
  let base = (overrideBase || S.serverUrl || '').trim();
  if (!base) {
    return { success: false, error: 'Server URL is empty. Enter it on the login screen.' };
  }
  if (!/^https?:\/\//i.test(base)) {
    return { success: false, error: `Server URL "${base}" is missing http:// or https:// — fix it on the login screen.` };
  }
  const url = base.replace(/\/+$/,'') + path;
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  let r;
  try {
    r = await fetch(url, opts);
  } catch (e) {
    // Browser-level network error (CORS, DNS, refused, offline, etc.). Re-throw
    // with a message that tells the caller exactly what URL failed and why.
    throw new Error(`Could not reach ${url} — ${e.message || e}. Check that the server is running and the URL is correct.`);
  }
  try { return await r.json(); }
  catch (e) { return { success: false, error: `Non-JSON response (HTTP ${r.status}) from ${url}` }; }
}

const API = {
  async get(path) {
    const [p, qs] = _splitPath(path);
    if (REMOTE_GETS.has(p)) {
      // Forward GET to the league server (still a GET there)
      return await _remoteFetch('GET', path);
    }
    // /api/rollup and /api/rollup_single are POSTs on the league server
    // but older call sites used .get(...). Translate.
    if (p === '/api/rollup' || p === '/api/rollup_single') {
      return await _remoteFetch('POST', p, {});
    }
    return await LocalAPI.get(p, _parseQS(qs));
  },
  async post(path, body) {
    const [p] = _splitPath(path);
    if (REMOTE_POSTS.has(p)) return await _remoteFetch('POST', p, body);
    return await LocalAPI.post(p, body || {});
  },
  async put(path, body) {
    const [p] = _splitPath(path);
    return await LocalAPI.put(p, body || {});
  },
};

/* ============================================================
   LocalAPI — FSA-backed handlers for former gui_server paths
   ============================================================ */
async function _ensureAccountLoaded() {
  if (S._accountCache) return S._accountCache;
  const a = await Store.readAccount();
  S._accountCache = a;
  return a;
}
async function _persistAccount(acc) {
  S._accountCache = acc;
  await Store.writeAccount(acc);
}

const LocalAPI = {
  async get(path, qs) {
    // ── Game data — cache-first, fetch from server if missing ────────────
    if (path === '/api/game_data') {
      const cached = await Store.readGameData();
      if (cached) return cached;
      const fresh = await _remoteFetch('GET', '/api/game_data');
      if (fresh && !fresh.error) await Store.writeGameData(fresh);
      return fresh;
    }

    // ── Session / account info (read-side) ───────────────────────────────
    if (path === '/api/session') {
      const a = await _ensureAccountLoaded();
      if (!a) return {};
      return {
        manager_name: a.manager_name || '',
        password    : a.remember ? (a.password_plaintext || '') : '',
        pw_stored   : '',
      };
    }

    if (path === '/api/account') {
      const a = await _ensureAccountLoaded();
      if (!a) return { success: false, error: 'Account not found.' };
      return { success: true, account: a };
    }

    // ── Team lookup ──────────────────────────────────────────────────────
    if (path === '/api/team') {
      const tid = parseInt(qs.id || '0', 10);
      const team = await Store.readTeam(tid);
      if (!team) return { success: false, error: 'Team not found.' };
      return { success: true, team };
    }

    // ── Newsletters (local cache of downloaded newsletters) ──────────────
    if (path === '/api/newsletters') {
      return { turns: await Store.listNewsletterTurns() };
    }
    if (path === '/api/newsletter') {
      // Local cached newsletter written by doLeagueDownloadAll. The UI
      // historically reads the `text` field (from the old gui_server shape);
      // the league server uses `newsletter`. Return both so any reader works.
      const turn = parseInt(qs.turn || '0', 10);
      const content = await Store.readNewsletter(turn);
      return {
        success:    !!content,
        turn,
        text:       content || '',
        newsletter: content || '',
      };
    }
    if (path === '/api/league/latest_newsletter') {
      return await _remoteFetch('GET', '/api/latest_newsletter');
    }

    // ── League settings (FSA-backed) ─────────────────────────────────────
    if (path === '/api/league_settings') {
      const s = await Store.readSettings();
      return {
        url         : s.server_url      || S.serverUrl || DEFAULT_SERVER_URL,
        managerId   : s.manager_id      || '',
        managerName : s.manager_name    || '',
        password    : s.password        || '',
        lastUpload  : s.last_upload     || '',
        lastDownload: s.last_download   || '',
        lastTurnRan : s.last_turn_ran   || 0,
      };
    }

    // ── Scout / Challenge targets — forwarded to the league server, with
    //    the current manager's password auto-injected from league settings.
    if (path === '/api/scout/status') {
      const mid = qs.manager_id || S.league.managerId || '';
      const pw  = encodeURIComponent(S.league.password || '');
      return await _remoteFetch('GET',
        `/api/scout/status?manager_id=${encodeURIComponent(mid)}&password=${pw}`);
    }
    if (path === '/api/scout/targets') {
      const mid = qs.manager_id || S.league.managerId || '';
      const pw  = encodeURIComponent(S.league.password || '');
      return await _remoteFetch('GET',
        `/api/scout/targets?manager_id=${encodeURIComponent(mid)}&password=${pw}`);
    }
    if (path === '/api/scout/report') {
      const mid   = qs.manager_id   || S.league.managerId || '';
      const wname = qs.warrior_name || '';
      const pw    = encodeURIComponent(S.league.password || '');
      return await _remoteFetch('GET',
        `/api/scout/report?manager_id=${encodeURIComponent(mid)}` +
        `&password=${pw}&warrior_name=${encodeURIComponent(wname)}`);
    }
    if (path === '/api/challenge/targets') {
      const mid = qs.manager_id || S.league.managerId || '';
      const tid = qs.team_id    || '';
      const pw  = encodeURIComponent(S.league.password || '');
      return await _remoteFetch('GET',
        `/api/challenge/targets?manager_id=${encodeURIComponent(mid)}` +
        `&password=${pw}&team_id=${encodeURIComponent(tid)}`);
    }

    // ── Progress (local stub — no local turn runner any more) ────────────
    if (path === '/api/progress') return { running: false, done: 0, total: 0, message: '' };

    return { success: false, error: `Unknown local GET ${path}` };
  },

  async post(path, body) {
    // ── Session save — persist login credentials locally ────────────────
    if (path === '/api/session/save') {
      const a = (await _ensureAccountLoaded()) || {};
      a.manager_name       = body.manager_name || a.manager_name || '';
      a.remember           = !!body.password;
      a.password_plaintext = body.password || '';
      await _persistAccount(a);
      return { success: true };
    }

    // ── League settings save ─────────────────────────────────────────────
    if (path === '/api/league_settings') {
      const s = await Store.readSettings();
      if (body.url)          s.server_url    = body.url;
      if (body.managerId)    s.manager_id    = body.managerId;
      if (body.managerName)  s.manager_name  = body.managerName;
      if (body.password)     s.password      = body.password;
      if (body.lastUpload)   s.last_upload   = body.lastUpload;
      if (body.lastDownload) s.last_download = body.lastDownload;
      if (body.lastTurnRan)  s.last_turn_ran = body.lastTurnRan;
      await Store.writeSettings(s);
      if (body.url) S.serverUrl = body.url;
      return { success: true };
    }

    // ── Apply league results (merge + save locally) ──────────────────────
    if (path === '/api/apply_league_results') {
      const tid    = parseInt(body.team_id || 0, 10);
      const result = body.result || {};
      const local  = await Store.readTeam(tid);
      if (!local) return { success: false, error: 'Local team not found.' };
      const merged = mergeResults(local, result);
      await Store.writeTeam(merged);
      // Also persist the raw result for audit.
      if (result.turn) await Store.writeTurnResult(result.turn, result);
      // Build a bout summary the UI expects
      const bouts = Array.isArray(result.bouts) ? result.bouts : [];
      return { success: true, team: merged, bouts, turn_number: result.turn || 0 };
    }

    // ── Save a newsletter locally after it's downloaded ──────────────────
    if (path === '/api/newsletter/save') {
      const turn = parseInt(body.turn || 0, 10);
      await Store.writeNewsletter(turn, body.text || '');
      return { success: true };
    }

    // ── Newsletter voice preference ──────────────────────────────────────
    if (path === '/api/newsletter/voice') {
      const s = await Store.readSettings();
      s.narrator_voice = body.voice || 'neutral';
      await Store.writeSettings(s);
      return { success: true };
    }

    // ── Team / warrior / scout mutations on local team files ─────────────
    const teamMutators = new Set([
      '/api/team/run_next_turn',
      '/api/team/remove',
      '/api/team/replace',
      '/api/team/challenge',
      '/api/team/blood_challenge',
      '/api/team/avoid_manager',
      '/api/warrior/avoid_warrior',
      '/api/warrior/replace',
      '/api/account/swap_team',
    ]);
    if (teamMutators.has(path)) {
      return await LocalAPI._teamMutation(path, body);
    }

    // ── Account create is handled entirely by doCreateAccount ────────────
    // (still forwards via API.post above). Kept here as a safety stub.
    if (path === '/api/account/create') {
      return { success: false, error: 'Account creation is handled by the new flow — this path is deprecated.' };
    }

    // ── Account login — local-only verification ──────────────────────────
    if (path === '/api/account/login') {
      const a = await _ensureAccountLoaded();
      if (!a) return { success: false, error: 'No account on this machine. Create one first.' };
      const name = (body.manager_name || '').trim();
      const pass = body.password || '';
      if (name.toUpperCase() !== (a.manager_name || '').toUpperCase()) {
        return { success: false, error: 'Manager name does not match the local account.' };
      }
      const hash = await sha256Hex((a.salt || '') + pass);
      if (hash !== (a.password_hash || '')) {
        return { success: false, error: 'Wrong password.' };
      }
      return {
        success:       true,
        id:            a.id,
        manager_name:  a.manager_name,
        email:         a.email || '',
        team_ids:      a.team_ids || [],
        run_next_turn: a.run_next_turn || {},
      };
    }

    // ── Scout select / remove — forwarded to the league server with password.
    if (path === '/api/scout/select' || path === '/api/scout/remove') {
      return await _remoteFetch('POST', path, {
        manager_id:   body.manager_id   || S.league.managerId || '',
        password:     S.league.password || '',
        warrior_name: body.warrior_name || '',
        team_name:    body.team_name    || '',
        team_id:      body.team_id      || 0,
      });
    }
    // /api/scout/confirm isn't currently wired to a UI button (selections are
    // auto-confirmed on select); stub it with a success for safety.
    if (path === '/api/scout/confirm') return { success: true };

    // ── Removed features (no-ops for legacy UI paths) ────────────────────
    if (path === '/api/turn/run' || path === '/api/run_all_turns') {
      return { success: false, error: 'Local turn running has been removed. Use Upload to send your team to the arena.' };
    }
    if (path === '/api/full_reset') {
      return { success: false, error: 'Full reset removed — delete your saved folder manually to reset.' };
    }
    if (path === '/api/league/check_reset' || path === '/api/league/acknowledge_reset') {
      return { success: true, reset_detected: false };
    }
    if (path === '/api/league/upload_one') {
      // Upload a single team to the league server. Called by "Upload All".
      const tid  = parseInt(body.team_id, 10);
      const team = await Store.readTeam(tid);
      if (!team) return { success: false, team_id: tid, error: 'Team not found locally.' };
      try {
        const url = (body.league_url || S.serverUrl).replace(/\/+$/,'');
        const r = await fetch(url + '/api/upload', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            manager_id: body.league_manager_id,
            password:   body.password,
            team:       team,
          }),
        });
        const d = await r.json();
        if (d.success) return { success: true, team_id: tid, team_name: team.team_name, turn: d.turn };
        return { success: false, team_id: tid, team_name: team.team_name, error: d.error || 'upload failed' };
      } catch (e) {
        return { success: false, team_id: tid, team_name: team.team_name, error: e.message || 'network error' };
      }
    }

    return { success: false, error: `Unknown local POST ${path}` };
  },

  async put(path, body) {
    if (path === '/api/warrior') {
      const tid = parseInt(body.team_id, 10);
      const idx = parseInt(body.warrior_idx, 10);
      const team = await Store.readTeam(tid);
      if (!team) return { success: false, error: 'Team not found.' };
      const w = team.warriors[idx];
      if (!w) return { success: false, error: 'Warrior slot empty.' };
      for (const field of ['armor','helm','primary_weapon','secondary_weapon','backup_weapon','blood_cry']) {
        if (field in body) {
          let v = body[field];
          if (v === 'None') v = null;
          w[field] = v;
        }
      }
      if ('want_monster_fight' in body) w.want_monster_fight = !!body.want_monster_fight;
      if ('want_retire'        in body) w.want_retire        = !!body.want_retire;
      if (Array.isArray(body.trains)) {
        w.trains = body.trains
          .filter(t => t && t !== '—')
          .map(t => t.toLowerCase().replace(/ /g, '_'))
          .slice(0, 3);
      }
      if (Array.isArray(body.strategies)) {
        w.strategies = [];
        for (const sd of body.strategies) {
          if (!sd.trigger) continue;
          w.strategies.push({
            trigger      : sd.trigger,
            style        : sd.style || 'Strike',
            activity     : parseInt(sd.activity ?? 5, 10),
            aim_point    : sd.aim_point || 'None',
            defense_point: sd.defense_point || 'None',
          });
        }
        if (!w.strategies.length) {
          w.strategies = [{
            trigger: 'Always (Default Loop)', style: 'Strike',
            activity: 5, aim_point: 'None', defense_point: 'None',
          }];
        }
      }
      await Store.writeTeam(team);
      return { success: true, warrior: w, team };
    }
    return { success: false, error: `Unknown local PUT ${path}` };
  },

  // ── Helpers for team-level mutations (all edit the team JSON) ──────────
  async _teamMutation(path, body) {
    const acc = await _ensureAccountLoaded();
    if (!acc) return { success: false, error: 'No account loaded.' };

    if (path === '/api/team/run_next_turn') {
      acc.run_next_turn = acc.run_next_turn || {};
      acc.run_next_turn[String(body.team_id)] = !!body.value;
      await _persistAccount(acc);
      return { success: true };
    }
    if (path === '/api/team/remove') {
      const tid = parseInt(body.team_id, 10);
      acc.team_ids = (acc.team_ids || []).filter(id => id !== tid);
      if (acc.run_next_turn) delete acc.run_next_turn[String(tid)];
      await _persistAccount(acc);
      await Store.deleteTeam(tid);
      return { success: true };
    }
    if (path === '/api/team/replace') {
      // Archive the old team by renaming to an archive path, then the
      // client starts a new-team flow in the freed slot.
      const tid = parseInt(body.old_team_id, 10);
      const old = await Store.readTeam(tid);
      if (old) {
        // Keep an archive copy so the history isn't lost.
        await fsaWriteJSON(`archives/team_${String(tid).padStart(4,'0')}.json`, old);
      }
      return { success: true, new_team_id: null };
    }
    if (path === '/api/account/swap_team') {
      const oldId = parseInt(body.old_team_id, 10);
      const newId = parseInt(body.new_team_id, 10);
      acc.team_ids = (acc.team_ids || []).map(id => id === oldId ? newId : id);
      if (acc.run_next_turn && acc.run_next_turn[String(oldId)] !== undefined) {
        acc.run_next_turn[String(newId)] = acc.run_next_turn[String(oldId)];
        delete acc.run_next_turn[String(oldId)];
      }
      await _persistAccount(acc);
      await Store.deleteTeam(oldId);
      return { success: true };
    }
    if (path === '/api/team/challenge') {
      const team = await Store.readTeam(parseInt(body.team_id, 10));
      if (!team) return { success: false, error: 'Team not found.' };
      team.challenges = team.challenges || {};
      if (body.action === 'remove') {
        const list = team.challenges[body.warrior_name] || [];
        team.challenges[body.warrior_name] = list.filter(t => t !== body.target_name);
      } else {
        const list = team.challenges[body.warrior_name] || [];
        if (!list.includes(body.target_name)) list.push(body.target_name);
        team.challenges[body.warrior_name] = list;
      }
      await Store.writeTeam(team);
      return { success: true, team };
    }
    if (path === '/api/team/blood_challenge') {
      const team = await Store.readTeam(parseInt(body.team_id, 10));
      if (!team) return { success: false, error: 'Team not found.' };
      team.blood_challenges = team.blood_challenges || [];
      team.blood_challenges.push({
        dead_warrior_name: body.dead_warrior_name,
        target_name:       body.target_name,
        challenger_name:   body.challenger_name || null,
        turns_remaining:   body.turns_remaining || 3,
        status:            'active',
      });
      await Store.writeTeam(team);
      return { success: true, team };
    }
    if (path === '/api/team/avoid_manager') {
      const team = await Store.readTeam(parseInt(body.team_id, 10));
      if (!team) return { success: false, error: 'Team not found.' };
      team.avoid_managers = team.avoid_managers || [];
      if (body.action === 'remove') {
        team.avoid_managers = team.avoid_managers.filter(m => m !== body.manager_name);
      } else if (team.avoid_managers.length < 2) {
        if (!team.avoid_managers.includes(body.manager_name)) {
          team.avoid_managers.push(body.manager_name);
        }
      }
      await Store.writeTeam(team);
      return { success: true, team };
    }
    if (path === '/api/warrior/avoid_warrior') {
      const team = await Store.readTeam(parseInt(body.team_id, 10));
      if (!team) return { success: false, error: 'Team not found.' };
      const w = team.warriors[parseInt(body.warrior_idx, 10)];
      if (!w) return { success: false, error: 'Warrior slot empty.' };
      w.avoid_warriors = w.avoid_warriors || [];
      if (body.action === 'remove') {
        w.avoid_warriors = w.avoid_warriors.filter(n => n !== body.target_name);
      } else if (!w.avoid_warriors.includes(body.target_name)) {
        w.avoid_warriors.push(body.target_name);
      }
      await Store.writeTeam(team);
      return { success: true, team };
    }
    if (path === '/api/warrior/replace') {
      const team = await Store.readTeam(parseInt(body.team_id, 10));
      if (!team) return { success: false, error: 'Team not found.' };
      const idx = parseInt(body.warrior_idx, 10);
      // Build a replacement warrior skeleton using the stats in body
      const w = {
        name:         (body.name || '').toUpperCase(),
        race:         body.race || 'Human',
        gender:       body.gender || 'Male',
        strength:     parseInt(body.strength, 10),
        dexterity:    parseInt(body.dexterity, 10),
        constitution: parseInt(body.constitution, 10),
        intelligence: parseInt(body.intelligence, 10),
        presence:     parseInt(body.presence, 10),
        size:         parseInt(body.size, 10),
        wins: 0, losses: 0, kills: 0, total_fights: 0,
        armor: null, helm: null,
        primary_weapon: 'Open Hand', secondary_weapon: 'Open Hand', backup_weapon: null,
        skills: {}, injuries: {head:0,chest:0,abdomen:0,primary_arm:0,secondary_arm:0,primary_leg:0,secondary_leg:0},
        strategies: [{ trigger: 'Always (Default Loop)', style: 'Strike', activity: 5, aim_point: 'None', defense_point: 'None' }],
        trains: [],
        fight_history: [],
        blood_cry: '',
        luck: Math.floor(Math.random() * 30) + 1,
        popularity: 0, recognition: 0, streak: 0, turns_active: 0,
        attribute_gains: { strength:0, dexterity:0, constitution:0, intelligence:0, presence:0 },
        initial_stats: {
          strength: parseInt(body.strength, 10),
          dexterity: parseInt(body.dexterity, 10),
          constitution: parseInt(body.constitution, 10),
          intelligence: parseInt(body.intelligence, 10),
          presence: parseInt(body.presence, 10),
        },
        is_dead: false, killed_by: '',
        ascended_to_monster: false,
        want_monster_fight: false, want_retire: false,
        monster_kills: 0,
        avoid_warriors: [],
      };
      // Archive the old warrior first, if any
      const old = team.warriors[idx];
      if (old) {
        team.archived_warriors = team.archived_warriors || [];
        team.archived_warriors.push(old);
      }
      team.warriors[idx] = w;
      await Store.writeTeam(team);
      return { success: true, team, warrior: w };
    }
    return { success: false, error: `Unhandled team mutation ${path}` };
  },
};

const _HEIGHT_RANGES = {
  'Halfling':[37,61],'Elf':[56,71],'Half-Elf':[60,72],
  'Human':[62,76],'Dwarf':[42,62],'Half-Orc':[65,90],
  'Monster':[72,108],'Peasant':[62,76],
};
const _DENSITY = {
  'Halfling':0.0434,'Elf':0.0338,'Half-Elf':0.0354,
  'Human':0.0368,'Dwarf':0.0780,'Half-Orc':0.0462,
  'Monster':0.0420,'Peasant':0.0368,
};
function calcMeasurements(race, gender, size, trainingWeightBonus) {
  const [mn_m, mx_m] = _HEIGHT_RANGES[race] || [62, 76];
  const female = gender === 'Female';
  const mn = female ? Math.floor(mn_m * 0.95) : mn_m;
  const mx = female ? Math.floor(mx_m * 0.95) : mx_m;
  const size_t = Math.max(0, Math.min(1, ((size||8) - 3) / 22));
  const height = Math.floor(mn + size_t * (mx - mn));
  let density = _DENSITY[race] || 0.0368;
  if (female) density *= 0.92;
  const weight = Math.max(30, Math.floor(height * height * density)) + (trainingWeightBonus || 0);
  return { height, weight };
}

const _SKILL_LABELS = {
  1: 'Has Novice Skill ({n}) in {s}',
  2: 'Has Some Skill ({n}) in {s}',
  3: 'Is Skilled ({n}) in {s}',
  4: 'Has Good Skill ({n}) in {s}',
  5: 'Is Very Skilled ({n}) in {s}',
  6: 'Has Excellent Skill ({n}) in {s}',
  7: 'Has Expert Skill ({n}) in {s}',
  8: 'Has Incredible Skill ({n}) in {s}',
  9: 'Is a Master ({n}) in {s}',
};
const _INJURY_DESCS = {
  1:'Annoying', 2:'Bothersome', 3:'Irritating', 4:'Troublesome',
  5:'Painful',  6:'Dreadful',   7:'Incapacitating', 8:'Devastating', 9:'Fatal',
};
const _INJURY_LOCS = ['head','chest','abdomen','primary_arm','secondary_arm','primary_leg','secondary_leg'];

function formatSkillsText(skills) {
  const lines = [];
  for (const [key, level] of Object.entries(skills || {}).sort((a,b) => a[0].localeCompare(b[0]))) {
    if (!level) continue;
    const name = key.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
    const tpl  = _SKILL_LABELS[level] || 'Has Skill Level ({n}) in {s}';
    lines.push(tpl.replace('{n}', level).replace('{s}', name));
  }
  return lines;
}

function formatInjuriesText(injuries) {
  const lines = [];
  for (const loc of _INJURY_LOCS) {
    const level = (injuries || {})[loc] || 0;
    if (!level) continue;
    const desc    = _INJURY_DESCS[level] || `Level ${level}`;
    const article = /^[aeiou]/i.test(desc) ? 'an' : 'a';
    const display = loc.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
    lines.push(`Has ${article} ${desc} (${level}) wound to the ${display}`);
  }
  return lines;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// jsq(v): JSON-stringify v and HTML-entity-encode both ' and " so the result can
// be safely embedded inside either single- or double-quoted HTML onclick attributes.
// The browser decodes &quot; → " and &#39; → ' before executing the JS.
function jsq(v) { return JSON.stringify(v).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
function el(id) { return document.getElementById(id); }
function setMsg(text, type='ok') { S.msg = text; S.msgType = type; }

function opts(items, val, blankLabel) {
  let h = blankLabel ? `<option value="">${esc(blankLabel)}</option>` : '';
  items.forEach(it => { h += `<option value="${esc(it)}" ${it===val?'selected':''}>${esc(it)}</option>`; });
  return h;
}

function fmtRecord(w) { return `${w.wins||0}-${w.losses||0}-${w.kills||0}`; }  // W-L-K

async function loadTeams() {
  if (!S.account) return;
  for (const tid of S.account.team_ids) {
    if (!S.teams[tid]) {
      const team = await Store.readTeam(tid);
      if (team) S.teams[tid] = team;
    }
  }
}

async function reloadTeam(tid) {
  const team = await Store.readTeam(tid);
  if (team) S.teams[tid] = team;
}

async function refreshLeagueFlags() {
  if (!S.league.url || !S.league.managerId) return;
  try {
    const resp = await fetch(S.league.url + '/api/flags');
    if (!resp.ok) return;
    const d = await resp.json();
    if (!d.success) return;
    S.league.flags = {
      show_favorite_weapon: d.show_favorite_weapon || false,
      show_luck_factor:     d.show_luck_factor     || false,
      show_max_hp:          d.show_max_hp          || false,
    };
  } catch(e) { /* silent */ }
}

function getSelWarrior() {
  if (S.sel.type !== 'warrior') return null;
  const team = S.teams[S.sel.teamId];
  if (!team) return null;
  return team.warriors[S.sel.wIdx] || null;
}

  if (S.narrative) showNarrativeOverlay(); else hideNarrativeOverlay();
  attachEvents();
}

function buildTree() {
  if (!S.account) return '<div id="tree-panel"></div>';
  let h = `<div id="tree-panel">`;

  // Manager row
  const mSel = S.sel.type === 'manager' ? 'sel' : '';
  h += `<div class="tree-row tree-mgr ${mSel}" id="tr-mgr"
             onclick="treeSelectManager()" style="cursor:default;">
    <span class="tree-exp"> </span>
    <span class="tree-ico">⚑</span>
    <span class="tree-lbl">${esc(S.account.manager_name)}</span>
  </div>`;

  for (const tid of S.account.team_ids) {
    const team = S.teams[tid];
    if (!team) continue;
    const expanded = S.expanded[tid] !== false;
    const tSel = (S.sel.type === 'team' && S.sel.teamId == tid) ? 'sel' : '';
    h += `<div class="tree-row ${tSel}" id="tr-t-${tid}"
               onclick="treeSelectTeam(${tid})" style="padding-left:18px; cursor:default;">
      <span class="tree-exp" onclick="event.stopPropagation(); treeToggle(${tid})"
            style="cursor:pointer; padding:0 4px;">${expanded ? '▼' : '▶'}</span>
      <span class="tree-ico">⚔</span>
      <span class="tree-lbl">${esc(team.team_name)}</span>
    </div>`;

    if (expanded) {
      (team.warriors || []).forEach((w, idx) => {
        if (!w) return;
        const wSel   = (S.sel.type === 'warrior' && S.sel.teamId == tid && S.sel.wIdx == idx) ? 'sel' : '';
        const isDead = w.is_dead || false;
        const isAscended = w.ascended_to_monster || false;

        // Injury indicator: count active permanent injuries
        const injLevels   = w.injury_levels || {};
        const injCount    = Object.values(injLevels).filter(v => v > 0).length;
        const hasSevere   = Object.values(injLevels).some(v => v >= 5);
        const injBadge    = injCount >= 3
          ? `<span title="${injCount} permanent injuries" style="color:${hasSevere?'#800':'#840'};
             font-size:10px; margin-left:3px;">[${injCount}⚕]</span>`
          : '';

        // Streak badge
        const streak = w.streak || 0;
        const streakBadge = streak >= 3
          ? `<span style="color:#060;font-size:9px;margin-left:3px;">W${streak}🔥</span>`
          : streak <= -3
          ? `<span style="color:#800;font-size:9px;margin-left:3px;">L${Math.abs(streak)}❄</span>`
          : '';

        // Monster/retire flag icons
        const flagBadge = w.want_monster_fight
          ? `<span title="Queued for Monster fight" style="font-size:10px;margin-left:3px;">☠</span>`
          : w.want_retire
          ? `<span title="Retirement pending" style="font-size:10px;margin-left:3px;">🏆</span>`
          : '';

        const deadStyle  = isDead ? 'opacity:0.55; font-style:italic;' : '';
        const deadIcon   = isAscended ? '👹' : (isDead ? '💀' : '👤');
        const deadBadge  = isAscended
          ? `<span title="Ascended to Monsterdom on The Monsters roster — replacement needed"
               style="color:#844;font-size:10px;margin-left:4px;">👹 ASCENDED</span>`
          : isDead
          ? `<span title="Slain by ${esc(w.killed_by||'unknown')} — replacement needed"
               style="color:#800;font-size:10px;margin-left:4px;">✝</span>`
          : '';

        h += `<div class="tree-row ${wSel}" id="tr-w-${tid}-${idx}"
                   onclick="treeSelectWarrior(${tid}, ${idx})"
                   style="padding-left:38px; cursor:default; ${deadStyle}">
          <span class="tree-exp"> </span>
          <span class="tree-ico">${deadIcon}</span>
          <span class="tree-lbl">${esc(w.name)}${deadBadge}${injBadge}${streakBadge}${flagBadge}</span>
        </div>`;
      });
    }
  }

  h += `</div>`;
  return h;
}

/* ============================================================
   TREE & TAB ACTION FUNCTIONS  (called by inline onclick)
   ============================================================ */
async function setWTab(tab) {
  // Flush any pending warrior save BEFORE we rebuild the DOM for the new
  // sub-tab — otherwise the 700ms auto-save timer would fire against an
  // empty DOM and wipe the warrior's equipment/training/strategies.
  if (_saveTimer) await flushSave();
  S.wTab = tab;
  if (tab === 'challenges' && S.challengeTargets === null) loadChallengeTargets();
  refreshContent();
}
function treeSelectManager() {
  S.sel    = {type: null};
  S.mgrTab = 'account';
  refreshTree();
  refreshContent();
}
function treeSelectTeam(tid) {
  S.sel = {type:'team', teamId: tid};
  refreshTree();
  refreshContent();
}
function treeToggle(tid) {
  S.expanded[tid] = !S.expanded[tid];
  refreshTree();
}
async function treeSelectWarrior(tid, idx) {
  if (_pendingWarrior && (S.sel.teamId !== tid || S.sel.wIdx !== idx)) {
    await flushSave();
  }
  S.sel  = {type:'warrior', teamId: tid, wIdx: idx};
  // Fetch fresh data so streak/favorite_weapon always reflect server state
  await Promise.all([reloadTeam(tid), refreshLeagueFlags()]);
  // Dead warriors open straight to the Replacement tab
  const team = S.teams[tid];
  const w    = team && team.warriors && team.warriors[idx];
  S.wTab = (w && w.is_dead) ? 'replacement' : 'stats';
  refreshTree();
  refreshContent();
}

   // Helper to ensure newsletter content is loaded for the manager tab.
   // This loads the list of turns, selects the latest if nothing is selected,
   // and loads the text for the selected turn if it's not already loaded.
   async function _ensureNewsletterContentLoadedForMgrTab() {
     // Ensure S.newsletters (list of turns) is loaded
     if (S.newsletters === null) {
       const r = await API.get('/api/newsletters');
       S.newsletters = r.turns || [];
     }

     // If no newsletters are found, reset state and return.
     if (!S.newsletters.length) {
       S.newsletterTurn = null;
       S.newsletterText = null;
       return;
     }

     // Ensure S.newsletterTurn is set to the latest if not already, and load its text if needed.
     const latest = S.newsletters[S.newsletters.length - 1];
     if (!S.newsletterTurn || S.newsletterTurn < latest || S.newsletterText === null) {
       await loadNewsletterTurn(latest); // loadNewsletterTurn handles setting S.newsletterText
     }
   }

  if (activeTab === 'account') {

    const record = (() => {

      for (const tid of (acc.team_ids||[])) {
        const team = S.teams[tid];

        for (const ww of team.warriors||[]) {
          if (!ww) continue;
          w+=ww.wins||0; l+=ww.losses||0; k+=ww.kills||0;
        }
        // Include archived (dead/replaced) warriors in cumulative record
        for (const aw of team.archived_warriors||[]) {
          if (!aw) continue;
          w+=aw.wins||0; l+=aw.losses||0; k+=aw.kills||0;
        }

    })();
    body = `
<div style="display:flex; flex-direction:column; height:100%;">

    <tr>
      <td style="padding:4px 8px; width:110px;">Name</td>
      <td><input type="text" class="ro" value="${esc(acc.manager_name||'')}" style="width:360px;" readonly></td>
      <td style="padding:4px 16px; width:80px;">Record</td>
      <td><input type="text" class="ro" value="${esc(record)}" style="width:160px;" readonly></td>
    </tr>
    <tr>
      <td style="padding:4px 8px;">Last Upload</td>
      <td><input type="text" class="ro" value="${esc(S.league.lastUpload||'—')}" style="width:360px;" readonly></td>
      <td style="padding:4px 16px;">Account #</td>
      <td><input type="text" class="ro" value="${esc(String(acc.id||''))}" style="width:160px;" readonly></td>
    </tr>
    <tr>
      <td style="padding:4px 8px;">Last Download</td>
      <td><input type="text" class="ro" value="${esc(S.league.lastDownload||'—')}" style="width:360px;" readonly></td>
      <td style="padding:4px 16px;">Last Turn Ran</td>
      <td><input type="text" class="ro" value="${esc(String(S.league.lastTurnRan||'—'))}" style="width:160px;" readonly></td>
    </tr>
    <tr>
      <td style="padding:4px 8px;">Email Address</td>
      <td><input type="text" class="ro" value="${esc(acc.email||'—')}" style="width:360px;" readonly></td>
      <td style="padding:4px 16px;">Run Next Turn</td>
      <td>
        <span style="font-size:11px; color:#555;">
          ${(()=>{ const ids=acc.team_ids||[]; const cnt=ids.filter(tid=>S.runNextTurn?.[tid]!==false).length; return cnt+"/"+ids.length+" team"+(cnt===1?"":"s")+" queued"; })()}
        </span>
      </td>
    </tr>
  </table>
  ${S.league.managerId ? `
  <div style="margin-top:10px; padding:8px; background:#f0f4f0; border:1px solid #ccc;">
    <span style="font-size:11px; color:#555;">Registered: <b style="color:#060;">${esc(S.league.managerName||'')}</b></span>
  </div>` : `
  <div style="margin-top:10px; padding:8px; background:#f0f4f0; border:1px solid #ccc;">
    <span style="font-size:11px; color:#999;">Not connected to a league server</span>
  </div>`}
</div>
<div style="display:flex; justify-content:center; align-items:center; flex:1; padding:20px; pointer-events:none;">
  <img src="${(S.serverUrl || '').replace(/\/+$/, '')}/bloodspire.png" alt="Bloodspire" style="width:90%; height:90%; object-fit:contain;">
</div>
</div>`;
  }

  else if (activeTab === 'newsletters') {
    // Inline newsletter selector (reuse newsletter panel logic)
    const turns = S.newsletters || [];
    const cur   = S.newsletterTurn;
    const text  = S.newsletterText;
    const voice = S.newsletterVoice || 'snide';
    if (!turns.length && S.newsletters === null) {
      // Initial load state, content will be populated by _ensureNewsletterContentLoadedForMgrTab
      body = '<div style="padding:20px; color:#666;">Loading newsletters...</div>';
    } else if (!turns.length) {
      // No newsletters found locally or from server
      body = '<div style="padding:20px; color:#666;">No newsletters available yet. Check back after league turns are run.</div>';
    } else {
      // Background refresh so new turns appear without requiring manual invalidation
      API.get('/api/newsletters').then(r => {
        const fresh = r.turns || [];
        const prev  = S.newsletters || [];
        const changed = fresh.length !== prev.length ||
                        fresh.some((t,i) => t !== prev[i]);
        if (!changed) return;
        const prevLatest = prev.length ? prev[prev.length - 1] : null;
        const latest     = fresh.length ? fresh[fresh.length - 1] : null;
        S.newsletters = fresh;
        if (latest && prevLatest !== null && latest > prevLatest) {
          S.newsletterTurn = latest;
          S.newsletterText = null;
          loadNewsletterTurn(latest);

          refreshContent();

function setMgrTab(tab) {
  S.mgrTab = tab;
  if (tab === 'scouting' && !S.scout.loaded) {
    loadScoutStatus();
  }
  if (tab === 'account' && S.league.managerId) {
    checkLeagueReset();
    loadLeagueSettings(); // Refresh league settings including last upload timestamp
  }
  if (tab === 'newsletters') {
    // Ensure newsletter content is loaded when the tab is activated
    _ensureNewsletterContentLoadedForMgrTab().then(() => {
      if (S.mgrTab === 'newsletters') refreshContent(); // Re-render if still on this tab
    });
  }
  if (tab === 'legacy') {
    S.legacyTeams = null; // force reload each time the tab is opened
    _loadLegacyTeams().then(() => { if (S.mgrTab === 'legacy') refreshContent(); });
  }
  refreshContent();
}

   LEGACY TAB
   ============================================================ */
async function _loadLegacyTeams() {
  const ids = await Store.listArchivedTeamIds();
  const teams = [];
  for (const tid of ids.slice().reverse()) { // newest (highest id) first
    const team = await Store.readArchivedTeam(tid);
    if (team) teams.push(team);
  }
  S.legacyTeams = teams;
}

function buildLegacyTab() {
  if (S.legacyTeams === null) {
    return '<div style="padding:20px; color:#666;">Loading legacy teams...</div>';
  }
  if (!S.legacyTeams.length) {
    return `<div style="padding:12px; color:#555;">
      <b>Legacy</b><br><br>No teams have been replaced yet.
    </div>`;
  }

  function warriorCard(w) {
    const rec  = `${w.wins||0}-${w.losses||0}-${w.kills||0}`;
    const inj  = formatInjuriesText(w.injuries).join('<br>') || '—';
    const skls = formatSkillsText(w.skills).join('<br>') || '—';
    const isDead      = w.is_dead;
    const isAscended  = w.ascended_to_monster;
    const label = isDead
      ? `<span style="color:#800;">✝ ${esc(w.name)}</span>`
      : isAscended
        ? `<span style="color:#844;">👹 ${esc(w.name)}</span>`
        : `<span style="color:#555;">⚔ ${esc(w.name)}</span>`;
    const statusLine = isDead
      ? `Slain by: <b>${esc(w.archived_killed_by||w.killed_by||'Unknown')}</b>`
      : isAscended
        ? `<b>Ascended to Monsterdom</b>`
        : `<b>Replaced</b>`;
    return `
<div class="group" style="margin:6px 4px; background:#f9f7f4;">
  <span class="group-label">${label}</span>
  <div style="display:flex; gap:20px; font-size:11px; flex-wrap:wrap; padding-top:4px;">
    <div>
      <div style="color:#666; margin-bottom:3px;">
        ${esc(w.race||'')} ${esc(w.gender||'')} &mdash; ${rec} (${w.total_fights||0} fights)<br>
        ${statusLine}
      </div>
      <table style="border-collapse:collapse; font-size:11px;">
        ${['strength','dexterity','constitution','intelligence','presence','size'].map(attr => {
          const deathVal = w[attr] != null ? w[attr] : '—';
          const baseVal  = (w.initial_stats && w.initial_stats[attr] != null) ? ` (${w.initial_stats[attr]})` : '';
          return `<tr><td style="padding:1px 6px; color:#555; width:90px;">${capitalize(attr)}</td>
               <td style="padding:1px 6px; font-weight:bold;">${deathVal}${baseVal}</td></tr>`;
        }).join('')}
      </table>
    </div>
    <div>
      <div style="color:#666; font-weight:bold; margin-bottom:3px;">Skills</div>
      <div style="color:#333; line-height:1.5;">${skls}</div>
    </div>
    <div>
      <div style="color:#666; font-weight:bold; margin-bottom:3px;">Permanent Injuries</div>
      <div style="color:#800; line-height:1.5;">${inj}</div>
    </div>
  </div>
</div>`;
  }

  let sections = '';
  S.legacyTeams.forEach(team => {
    let tw=0, tl=0, tk=0;
    const allWarriors = [...(team.warriors||[]), ...(team.archived_warriors||[])].filter(Boolean);
    allWarriors.forEach(w => { tw+=w.wins||0; tl+=w.losses||0; tk+=w.kills||0; });

    // archived_warriors (fallen before dissolution) then warriors (active at dissolution)
    const fallen   = (team.archived_warriors||[]).filter(Boolean).slice().reverse();
    const atDeath  = (team.warriors||[]).filter(Boolean);
    const warriors = [...atDeath, ...fallen];

    let warriorCards = warriors.map(w => warriorCard(w)).join('');
    if (!warriorCards) warriorCards = '<div style="padding:6px; color:#aaa;">No warrior records.</div>';

    sections += `
<div style="margin-bottom:12px;">
  <div style="font-weight:bold; font-size:12px; padding:4px 6px; background:#d4d0c8; border:1px solid #bbb; margin-bottom:2px;">
    ${esc(team.team_name)} &mdash; Career: ${tw}-${tl}-${tk}
  </div>
  ${warriorCards}
</div>`;
  });

  return `<div style="padding:6px;">
    <div style="font-weight:bold; margin-bottom:8px;">Legacy — Replaced Teams</div>
    ${sections}
  </div>`;
}

  }

  // ── Current selections ────────────────────────────────────────────────────
  let selRows = '';
  (sc.selections || []).forEach(entry => {
    const isConfirmed = entry.confirmed !== undefined ? entry.confirmed : true;
    const btn = isConfirmed
      ? `<span style="font-size:11px; color:#666; font-style:italic;">🔒 Locked</span>`
      : `<button onclick='removeScout(${jsq(entry.warrior_name)})'
                style="color:#800; font-size:11px; padding:1px 6px; border-color:#f88 #800 #800 #f88;">✕ Remove</button>`;

  }

  const slotsLeft = sc.slotsLeft ?? (3 - (sc.selections||[]).length);

        <td style="padding:3px 8px; text-align:center;">${w.total_fights}</td>

    });
    if (!trows) {
      trows = `<tr><td colspan="6" style="padding:8px; color:#888; font-style:italic;">
        No warriors match the search filter.</td></tr>`;
    }
    targetsHtml = `
    <div style="margin-bottom:6px; display:flex; align-items:center; gap:6px;">
      <span style="font-size:11px;">Search:</span>
      <input type="text" value="${esc(sc.filterText||'')}" oninput="scoutFilter(this.value)"
             style="width:200px; font-size:11px;" placeholder="Name or team...">
      <span style="font-size:11px; color:#666;">${visible.length} of ${sc.targets.length} warrior${sc.targets.length===1?'':'s'}</span>

    <table style="border-collapse:collapse; width:100%; font-size:12px;">
      <thead>
        <tr style="border-bottom:2px solid #ccc; color:#666; font-size:11px;">
          <th style="padding:4px 8px; text-align:left; font-weight:600;">Name</th>
          <th style="padding:4px 8px; text-align:left; font-weight:600;">Team</th>
          <th style="padding:4px 8px; text-align:left; font-weight:600;">Race</th>

function buildScoutReport(report) {
  const equip = [
    ['Armor',            report.armor],
    ['Helm',             report.helm],
    ['Primary Weapon',   report.primary_weapon],
    ['Secondary Weapon', report.secondary_weapon],
    ['Backup Weapon',    report.backup_weapon],

  ).join('');

    ? _renderScoutReportText(reportText)

  return `

    <span class="group-label">Scout's Field Report</span>
    ${reportHtml}

function _renderScoutReportText(text) {
  // Split the plain-text report into styled HTML sections.
  // Section headers are ALL-CAPS lines (like "FIGHT OBSERVED", "TACTICAL RECOMMENDATION", etc.)
  const HEADER_RE = /^[A-Z][A-Z\s\-']+$/;
  const DIVIDER_RE = /^-{3,}$/;

  const lines = text.split('\n');
  let html = '<div style="font-family:\'Courier New\',monospace; font-size:11px; line-height:1.6; padding:4px 0;">';
  let inSection = false;

  for (let i = 0; i < lines.length; i++) {
    const raw  = lines[i];
    const trim = raw.trim();

    if (!trim) {
      html += '<div style="height:6px;"></div>';
      continue;
    }

    // Top-level report header lines (first 4 lines — name, filed-by, record)
    if (i < 5 && trim) {
      if (i === 0) {
        html += `<div style="font-size:13px; font-weight:bold; letter-spacing:1px; color:#3a1a00; margin-bottom:4px;">${esc(trim)}</div>`;
      } else {
        html += `<div style="font-size:11px; color:#555; margin-bottom:2px;">${esc(trim)}</div>`;
      }
      continue;
    }

    // Divider lines — skip rendering
    if (DIVIDER_RE.test(trim)) continue;

    // ALL-CAPS section headings
    if (HEADER_RE.test(trim) && trim.length > 3) {
      html += `<div style="margin-top:10px; margin-bottom:3px; font-size:11px; font-weight:bold;
                            letter-spacing:0.5px; color:#5a2800; border-bottom:1px solid #d4b896;
                            padding-bottom:2px;">${esc(trim)}</div>`;
      continue;
    }

    // "THREAT LEVEL:" keyword — highlight it
    if (trim.startsWith('THREAT LEVEL:')) {
      const isHigh = trim.includes('HIGH');
      const isMod  = trim.includes('MODERATE');
      const color  = isHigh ? '#8b0000' : isMod ? '#7a4800' : '#1a5c1a';
      html += `<div style="margin:4px 0; padding:4px 8px; background:${isHigh?'#fff0f0':isMod?'#fff8e8':'#f0fff0'};
                            border-left:3px solid ${color}; color:${color}; font-weight:bold; font-size:11px;">${esc(trim)}</div>`;
      continue;
    }

    // "Advisory:" / "Note:" / "Weapon note:" prefix lines
    if (/^(Advisory|Note|Weapon note):/i.test(trim)) {
      html += `<div style="margin:2px 0 2px 8px; color:#444; font-style:italic; font-size:11px;">${esc(trim)}</div>`;
      continue;
    }

    // Indented lines (start with spaces/2+ spaces in original)
    if (raw.startsWith('  ') || raw.startsWith('\t')) {
      html += `<div style="margin:1px 0 1px 12px; color:#333; font-size:11px;">${esc(trim)}</div>`;
      continue;
    }

    // Closing signature lines ("— Name")
    if (trim.startsWith('—') || trim.startsWith('-')) {
      html += `<div style="margin-top:8px; color:#555; font-style:italic; font-size:11px;">${esc(trim)}</div>`;
      continue;
    }

    // Default paragraph line
    html += `<div style="margin:2px 0; color:#222; font-size:11px;">${esc(trim)}</div>`;
  }

  html += '</div>';
  return html;
}

async function loadScoutStatus() {
  const mid = (S.account || {}).id || 0;
  if (!mid) return;
  try {
    const r = await API.get(`/api/scout/status?manager_id=${mid}`);
    if (r.success) {
      S.scout.loaded     = true;
      S.scout.slotsLeft  = r.slots_left;
      // selections from server now have full object structure with confirmed status
      S.scout.selections = (r.selections || []).map(sel => {
        if (typeof sel === 'string') {
          // Legacy support for string-only format
          return { warrior_name: sel, team_name: '', team_id: 0, confirmed: true };
        }
        return {
          warrior_name: sel.warrior_name || '',
          team_name: sel.team_name || '',
          team_id: sel.team_id || 0,
          confirmed: sel.confirmed !== undefined ? sel.confirmed : true
        };
      });
    }
  } catch(e) {}
  // Also load targets if not yet loaded
  if (S.scout.targets === null) {
    loadScoutTargets();
  } else {
    refreshContent();
  }
}

async function loadScoutTargets() {
  const mid = (S.account || {}).id || 0;
  if (!mid) return;
  try {
    const r = await API.get(`/api/scout/targets?manager_id=${mid}`);
    if (r.success) {
      S.scout.targets = r.warriors || [];
      // Back-fill team names on selections now that we have target data
      S.scout.selections = S.scout.selections.map(sel => {
        const found = S.scout.targets.find(t => t.name === sel.warrior_name);
        return {
          warrior_name: sel.warrior_name,
          team_name: found ? found.team_name : sel.team_name,
          team_id: found ? found.team_id : sel.team_id,
          confirmed: sel.confirmed
        };
      });
    }
  } catch(e) { S.scout.targets = []; }
  refreshContent();
}

async function loadChallengeTargets() {
  const mid    = (S.account || {}).id || 0;
  const teamId = S.sel.teamId || 0;
  try {
    const r = await API.get(`/api/challenge/targets?manager_id=${mid}&team_id=${teamId}`);
    S.challengeTargets = r.success ? (r.warriors || []) : [];
  } catch(e) { S.challengeTargets = []; }
  refreshContent();
}

async function addScout(warriorName, teamName, teamId) {
  const mid = (S.account || {}).id || 0;
  // Add scout with immediate confirmation
  const r = await API.post('/api/scout/select', {
    manager_id: mid,
    warrior_name: warriorName,
    team_name: teamName,
    team_id: teamId
  });
  
  if (r.success) {
    // Update selections list
    S.scout.slotsLeft = r.slots_left;
    S.scout.selections = (r.selections || []).map(sel => ({
      warrior_name: sel.warrior_name || sel,
      team_name: sel.team_name || '',
      team_id: sel.team_id || 0,
      confirmed: sel.confirmed !== undefined ? sel.confirmed : true
    }));
    
    // Now fetch and show the scout report immediately
    await viewScoutReport(warriorName);
  } else {
    alert('Could not add scout: ' + r.error);
  }
}

async function removeScout(warriorName) {
  const mid = (S.account || {}).id || 0;
  const selection = (S.scout.selections || []).find(s => s.warrior_name === warriorName);
  
  // Only allow removal of unconfirmed selections
  if (selection && selection.confirmed) {
    alert('Cannot remove a confirmed scout selection. Confirmed scouts are locked until the turn ends.');
    return;
  }
  
  const r = await API.post('/api/scout/remove', { manager_id: mid, warrior_name: warriorName });
  if (r.success) {
    S.scout.slotsLeft = r.slots_left;
    S.scout.selections = (r.selections || []).map(sel => ({
      warrior_name: sel.warrior_name || sel,
      team_name: sel.team_name || '',
      team_id: sel.team_id || 0,
      confirmed: sel.confirmed !== undefined ? sel.confirmed : true
    }));
    render();
  } else {
    alert('Could not remove scout: ' + r.error);
  }
}

async function viewScoutReport(warriorName) {
  const mid = (S.account || {}).id || 0;
  try {
    const r = await API.get(`/api/scout/report?manager_id=${mid}&warrior_name=${encodeURIComponent(warriorName)}`);
    if (r.success) {
      S.scout.report = r.report;
      render();
    } else {
      alert('Could not load scouting report: ' + (r.error || 'Unknown error'));
    }
  } catch(e) {
    alert('Error loading scouting report.');
  }
}

function closeScoutReport() {
  S.scout.report = null;
  render();
}

function scoutFilter(text) {
  S.scout.filterText = text;
  render();
}

  if (!type) {
    return buildManagerPanel();

  if (type === 'newsletter') {
    return buildNewsletterPanel();
  }

  if (type === 'team') {
    const team = S.teams[teamId];
    if (!team) return '<div style="padding:10px;">Loading...</div>';
    return buildTeamPanel(team);

  if (type === 'warrior') {
    const team = S.teams[teamId];

    const w = team.warriors[wIdx];
    if (!w) return '<div style="padding:10px;">Empty slot.</div>';
    return buildWarriorPanel(team, w, wIdx);
  }

  return '';
}
