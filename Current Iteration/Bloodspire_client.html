/* ============================================================
   WARRIOR PANEL — TABS
   ============================================================ */
function buildWarriorPanel(team, w, wIdx) {
  const isAscended = w.ascended_to_monster || false;
  const isDead = w.is_dead || false;
  const tabs = isDead
    ? ['Stats/Strats', 'Fights', 'Replacement']
    : ['Stats/Strats', 'Fight Options', 'Fights', 'Challenges', 'Replacement', 'Archives'];
  const tabMap = {
    'Stats/Strats':'stats', 'Fight Options':'fight', 'Fights':'fights',
    'Challenges':'challenges', 'Replacement':'replacement', 'Archives':'archives'
  };
  let tabsHtml = `<div class="tabs">`;
  tabs.forEach(t => {
    const key = tabMap[t];
    tabsHtml += `<div class="tab ${S.wTab===key?'active':''}" onclick="setWTab('${key}')">${t}</div>`;
  });
  tabsHtml += `</div>`;

  let body = '';
  if      (S.wTab === 'stats')       body = buildStatsTab(team, w, wIdx);
  else if (S.wTab === 'fight')       body = buildFightOptionsTab(w);
  else if (S.wTab === 'fights')      body = buildFightsTab(w);
  else if (S.wTab === 'challenges')  body = buildChallengesTab(team, w);
  else if (S.wTab === 'replacement') body = buildReplacementTab(w);
  else if (S.wTab === 'archives')    body = buildArchivesTab(team);

  return tabsHtml + `<div class="tab-body" style="overflow:auto;">${body}</div>`;
}

/* ---- Stats / Strats tab ---- */
function buildStatsTab(team, w, wIdx) {
  // Guard: if game data hasn't loaded yet return a placeholder.
  // This prevents empty selects from firing scheduleAutoSave() on render
  // and overwriting the warrior's saved armor/weapons/trains/strategies.
  if (!S.gd) return '<div style="padding:20px;color:#555;">Loading game data...</div>';
  const gd = S.gd;
  const { height: _hin, weight: _wlbs } = calcMeasurements(w.race, w.gender, w.size, w.training_weight_bonus);
  const ft = Math.floor(_hin / 12), ins = _hin % 12;

  // Stat rows
  const attrs = ['strength','dexterity','constitution','intelligence','presence','size'];
  let statRows = '';
  attrs.forEach(a => {
    const cur = w[a] || 0;
    const ini = (w.initial_stats && w.initial_stats[a]) ? w.initial_stats[a] : cur;
    const dv  = (cur !== ini) ? `${cur} (${ini})` : `${cur}`;
    statRows += `<tr>
      <td style="text-align:right; padding:1px 6px; min-width:90px;">${capitalize(a)}</td>
      <td style="padding:1px 4px;"><span class="stat-val">${esc(dv)}</span></td>

  // Equipment dropdowns
  const armor_opts = (gd.armor||[]).concat(['None']);
  const helm_opts  = (gd.helms||[]).concat(['None']);
  const wpn_opts   = gd.weapons||[];
  const cur_armor  = w.armor||'None';
  const cur_helm   = w.helm||'None';
  const cur_prim   = w.primary_weapon||'Open Hand';
  const cur_sec    = w.secondary_weapon||'Open Hand';
  const cur_bkp    = w.backup_weapon||'None';

  // Build grouped train options: Attributes | Skills | Weapons
  const attrTrains  = ['Strength','Dexterity','Constitution','Intelligence','Presence'];
  const skillTrains = ['Acrobatics','Bash','Brawl','Charge','Cleave','Disarm','Dodge','Feint','Initiative','Lunge','Parry','Riposte','Slash','Strike','Sweep','Throw'];
  const gdTrains    = (gd.train_skills||[]);
  const wpnTrains   = gdTrains.filter(t => !attrTrains.includes(t) && !skillTrains.includes(t));

  const t1 = (w.trains||[])[0]||'', t2 = (w.trains||[])[1]||'', t3 = (w.trains||[])[2]||'';

  function tOpts(val) {
    // Normalise stored key (e.g. "war_flail" → "War Flail") for comparison
    const norm = v => v.replace(/_/g,' ').replace(/\b\w/g, ch => ch.toUpperCase());
    const valNorm = norm(val);
    const sel = v => (v === val || norm(v) === valNorm) ? ' selected' : '';
    let h = '<option value="">—</option>';
    h += '<optgroup label="── Attributes ──">';
    attrTrains.forEach(a => { h += `<option value="${a}"${sel(a)}>${a}</option>`; });
    h += '</optgroup><optgroup label="── Skills ──">';
    skillTrains.forEach(s => { h += `<option value="${s}"${sel(s)}>${s}</option>`; });
    h += '</optgroup><optgroup label="── Weapons ──">';
    wpnTrains.forEach(wn => { h += `<option value="${wn}"${sel(wn)}>${wn}</option>`; });
    h += '</optgroup>';
    return h;
  }

  // Strategies
  const triggers = gd.triggers||[];
  const styles   = gd.styles||[];
  const aimPts   = gd.aim_points||[];
  const OC = 'onchange="scheduleAutoSave()"';

  // Build 5 regular strat rows + 1 default
  let stratRows = '';
  const strats = w.strategies || [];

  // Separate Always/default row from numbered trigger rows
  const isDefaultTrigger = t => t === 'Always' || t === 'Always (Default Loop)';
  const numbered = strats.filter(s => !isDefaultTrigger(s.trigger));
  const always   = strats.find(s => isDefaultTrigger(s.trigger)) || {trigger:'Always (Default Loop)',style:'',activity:'',aim_point:'',defense_point:''};

  // Blank-first option list — blank = row inactive
  function stratOpts(items, val) {
    let h = '<option value=""></option>';
    items.forEach(it => { h += `<option value="${esc(it)}" ${it===val?'selected':''}>${esc(it)}</option>`; });
    return h;
  }

  for (let i = 0; i < 5; i++) {
    const s = numbered[i] || { trigger:'', style:'', activity:'', aim_point:'', defense_point:'' };
    stratRows += `<tr>
      <td class="row-num">${i+1}</td>
      <td><select data-si="${i}" data-sf="trigger" ${OC}>${stratOpts(triggers, s.trigger)}</select></td>
      <td><select data-si="${i}" data-sf="style" ${OC}>${stratOpts(styles, s.style)}</select></td>

      <td><select data-si="${i}" data-sf="aim_point" ${OC}>${stratOpts(aimPts, s.aim_point)}</select></td>
      <td><select data-si="${i}" data-sf="defense_point" ${OC}>${stratOpts(aimPts, s.defense_point)}</select></td>
    </tr>`;

  // D row — "Always" trigger locked, cannot be changed
  stratRows += `<tr>
    <td class="row-num" style="font-weight:bold;">D</td>
    <td style="padding:2px 4px; background:#ececec; font-style:italic; color:#444;">Always (Default Loop)</td>

  const retireLabel = canRetire
    ? 'Retire Warrior — submit retirement papers this turn'
    : `Retire Warrior — not eligible yet (${w.total_fights||0}/100 fights)`;

  return `
<div style="padding:12px;">
  <div class="group" style="margin:0 0 12px;">
    <span class="group-label">Fight Options for This Turn</span>
    <p style="font-size:11px; color:#555; margin:0 0 10px;">
      These flags apply to the <b>next turn only</b> and clear automatically after fights run.
    </p>

    <label style="display:flex; align-items:flex-start; gap:8px; margin-bottom:14px; cursor:default;">
      <input type="checkbox" id="fo-monster"
             ${isMonster ? 'checked' : ''}
             onchange="saveFightOption('want_monster_fight', this.checked)"
             style="margin-top:2px;">
      <span>
        <b>Monster Warrior</b><br>
        <span style="font-size:11px; color:#555;">
          ${esc(w.name)} will face one of the Arena&#39;s monsters instead of a normal rival.
          Monsters are near-impossible to defeat &mdash; this almost always ends in death.
          <b style="color:#800;">Only choose this if you want a replacement warrior.</b>
        </span>
      </span>
    </label>

    <label style="display:flex; align-items:flex-start; gap:8px; cursor:default;
                  ${canRetire ? '' : 'opacity:0.5; pointer-events:none;'}">
      <input type="checkbox" id="fo-retire"
             ${isRetire ? 'checked' : ''}
             ${canRetire ? '' : 'disabled'}
             onchange="saveFightOption('want_retire', this.checked)"
             style="margin-top:2px;">
      <span>
        <b>${retireLabel}</b><br>
        <span style="font-size:11px; color:#555;">
          ${canRetire
            ? `${esc(w.name)} has earned a hero&#39;s retirement after ${w.total_fights} fights.
               They leave the team this turn and a new recruit takes their place.`
            : `Warriors must complete 100 fights to be eligible for retirement.`
          }
        </span>
      </span>
    </label>
  </div>

  <div class="group" style="margin:0;">
    <span class="group-label">Career Summary</span>
    <table style="border-collapse:collapse; font-size:11px; width:100%;">
      <tr>
        <td style="padding:3px 10px; color:#555; width:120px;">Total Fights</td>
        <td style="padding:3px 8px; font-weight:bold;">${w.total_fights||0}</td>
        <td style="padding:3px 10px; color:#555; width:120px;">Turns Active</td>
        <td style="padding:3px 8px; font-weight:bold;">${w.turns_active||0}</td>
      </tr>
      <tr>
        <td style="padding:3px 10px; color:#555;">Popularity</td>
        <td style="padding:3px 8px; font-weight:bold;">${w.popularity||0}/100</td>
        <td style="padding:3px 10px; color:#555;">Current Streak</td>
        <td style="padding:3px 8px;">${streakLabel(w.streak||0)}</td>
      </tr>
      <tr>
        <td style="padding:3px 10px; color:#555;">Can Retire</td>
        <td style="padding:3px 8px;" colspan="3">
          ${canRetire
            ? '<b style="color:#060">Yes</b>'
            : `<span style="color:#555">No &mdash; needs ${100-(w.total_fights||0)} more fight(s)</span>`}
        </td>
      </tr>
    </table>
  </div>
</div>`;
}

function streakLabel(s) {
  if (s === 0)  return '<span style="color:#888">—</span>';
  if (s  >  0)  return `<b style="color:#060">W${s}</b>`;
  return `<b style="color:#800">L${Math.abs(s)}</b>`;
}

async function saveFightOption(field, value) {
  const {teamId, wIdx} = S.sel;
  if (teamId == null || wIdx == null) return;
  try {
    const r = await API.put('/api/warrior', {
      team_id: teamId, warrior_idx: wIdx,
      [field]: value,
    });
    if (r.success) {
      const w = S.teams[teamId]?.warriors?.[wIdx];
      if (w) w[field] = value;
    } else {
      alert('Could not save: ' + r.error);
    }
  } catch(e) { console.warn('saveFightOption:', e); }
}
function buildFightsTab(w) {
  const history = (w.fight_history || []).slice().reverse(); // newest first
  
  // Sort fights by type priority: champion, monster, blood_challenge, challenge, rivalry, peasant, unknown
  const typeOrder = { 'champion': 0, 'monster': 1, 'blood_challenge': 2, 'challenge': 3, 'rivalry': 4, 'peasant': 5 };
  const getTypeOrder = (type) => typeOrder[type] !== undefined ? typeOrder[type] : 999;
  
  history.sort((a, b) => {
    // Primary: newest turn first so recent fights are always visible at the top
    const turnDiff = (b.turn || 0) - (a.turn || 0);
    if (turnDiff !== 0) return turnDiff;
    // Secondary: fight type priority within the same turn (champion before rivalry)
    return getTypeOrder(a.fight_type) - getTypeOrder(b.fight_type);
  });
  
  if (!history.length) {
    return `<div style="padding:10px;">
      <b>Fight History</b><br><br>
      <span style="color:#666;">${esc(w.name)} has not fought yet.</span>
      <br><br>Record: ${esc(fmtRecord(w))} (${w.total_fights||0} fights)
    </div>`;
  }
  let rows = '';
  history.forEach((h, i) => {
    const res = h.result ? h.result.toUpperCase() : '—';
    const resColor = res==='WIN' ? '#060' : res==='LOSS' ? '#800' : '#444';
    const slainNote  = h.warrior_slain  ? ' <b style="color:#800">(SLAIN)</b>'  : '';
    const killedNote = h.opponent_slain ? ' <b style="color:#060">(KILLED)</b>' : '';
    const fid = h.fight_id;
    const viewBtn = fid
      ? `<button class="sm" onclick="openNarrative(${fid},${h.turn||0})">View Fight</button>`
      : `<span style="color:#aaa; font-size:10px;">no log</span>`;
    
    // Special styling for champion fights
    const isChampFight = h.fight_type === 'champion';
    const champStyle = isChampFight ? 'background:#fff8f0; border-left:3px solid #c60;' : `${i%2===0?'background:#f5f4f0;':''}`;
    const opponentDisplay = isChampFight && res === 'WIN'
      ? `${esc(w.name)} defeated ${esc(h.opponent_name)} in an actionpacked ${h.minutes} minute Champion Fight${killedNote}`
      : `${esc(h.opponent_name)}${killedNote}`;
    
    if (isChampFight) {
      // Champion fights get special row formatting
      rows += `<tr style="${champStyle} font-weight:bold;">
        <td style="padding:2px 6px; text-align:center;">${h.turn||'—'}</td>
        <td style="padding:2px 6px; color:#c60;">★ CHAMPION FIGHT ★</td>
        <td style="padding:2px 6px;">${opponentDisplay}${slainNote}</td>
        <td style="padding:2px 6px; text-align:center; color:${resColor}; font-weight:bold;">${res}</td>
        <td style="padding:2px 6px; text-align:center;">${h.is_kill?'<b style="color:#060">☠</b>':''}</td>
        <td style="padding:2px 6px; text-align:center;">${h.minutes||'—'} min</td>
        <td style="padding:2px 6px;">${viewBtn}</td>
      </tr>`;
    } else {
      // Regular fights
      rows += `<tr style="${champStyle}">
        <td style="padding:2px 6px; text-align:center;">${h.turn||'—'}</td>
        <td style="padding:2px 6px;">${esc(h.opponent_name)}</td>
        <td style="padding:2px 6px; text-align:center;">${esc(h.opponent_race||'')}</td>
        <td style="padding:2px 6px; text-align:center; color:${resColor}; font-weight:bold;">${res}${slainNote}</td>
        <td style="padding:2px 6px; text-align:center;">${h.is_kill?'<b style="color:#060">☠</b>':''}</td>
        <td style="padding:2px 6px; text-align:center;">${h.minutes||'—'} min</td>
        <td style="padding:2px 6px;">${viewBtn}</td>
      </tr>`;
    }
  });
  return `
<div style="padding:6px;">
  <div style="font-weight:bold; margin-bottom:6px;">Fight History — ${esc(w.name)}</div>
  <div style="color:#555; margin-bottom:6px;">Record: ${esc(fmtRecord(w))} — ${w.total_fights||0} fights (W-L-K)</div>
  <div style="overflow-x:auto;">
  <table class="grid" style="font-size:11px;">
    <thead>
      <tr>
        <th style="width:40px;">Turn</th>
        <th style="min-width:140px;">Opponent</th>
        <th style="width:80px;">Race</th>
        <th style="width:60px;">Result</th>
        <th style="width:45px;">Kill</th>
        <th style="width:60px;">Duration</th>
        <th style="width:80px;">Narrative</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>
  </div>
</div>`;
}
function buildChallengesTab(team, w) {
  const fights    = w.total_fights || 0;
  const minFights = Math.floor(fights * 0.90);
  const maxFights = Math.floor(fights * 1.30);

  // Current challenges queued for this warrior
  const pendingMap  = team.challenges || {};
  const myPending   = pendingMap[w.name] || [];
  const slotsUsed   = myPending.length;
  const slotsLeft   = 3 - slotsUsed;

  // Blood challenges available for this team
  const activeBloodChallenges = (team.blood_challenges || []).filter(bc => 
    bc.status === "active" && bc.turns_remaining > 0
  );

  // Blood challenges where this warrior is the selected challenger
  const bloodList = (team.blood_challenges || []).filter(bc =>
    bc.status === "active" && (bc.challenger_name === w.name || bc.challenger_name === null)
  );

  // Collect eligible opponents from the server-provided target list (includes AI teams)
  if (S.challengeTargets === null) {
    return '<div style="padding:20px; color:#555;">Loading challenge targets...</div>';
  }
  const opponents = [];
  for (const ow of S.challengeTargets) {
    const owFights = ow.total_fights || 0;
    if (owFights >= minFights && owFights <= maxFights) {
      opponents.push({
        name     : ow.name,
        teamName : ow.team_name,
        race     : ow.race || '—',
        record   : `${ow.wins||0}-${ow.losses||0}-${ow.kills||0}`,
        fights   : owFights,
      });
    }
  }
  opponents.sort((a, b) => a.fights - b.fights || a.name.localeCompare(b.name));

  // ── Pending challenges rows ──────────────────────────────────────────────
  let pendingRows = '';
  myPending.forEach(target => {
    // Try to find target info from loaded teams
    let teamLabel = '', fightLabel = '';
    for (const t of Object.values(S.teams || {})) {
      const ow = (t.warriors || []).find(x => x && x.name === target);
      if (ow) { teamLabel = t.team_name; fightLabel = `${ow.total_fights||0} fights`; break; }
    }
    const info = teamLabel ? `${esc(teamLabel)}${fightLabel ? ', ' + fightLabel : ''}` : '—';
    pendingRows += `
    <tr>
      <td style="padding:4px 8px; font-weight:bold;">${esc(target)}</td>
      <td style="padding:4px 8px; color:#555;">${info}</td>
      <td style="padding:4px 8px;">
        <button onclick="removeChallenge(${jsq(w.name)},${jsq(target)})"
                style="color:#800; font-size:11px; padding:1px 6px; border-color:#f88 #800 #800 #f88;">
          ✕ Remove
        </button>
      </td>
    </tr>`;
  });
  bloodList.forEach(bc => {
    pendingRows += `
    <tr style="background:#ffe8e8;">
      <td style="padding:4px 8px; font-weight:bold;">${esc(bc.target_name || '?')}</td>
      <td style="padding:4px 8px; color:#800; font-size:11px;">Blood Challenge for ${esc(bc.dead_warrior_name || '?')} — ${bc.turns_remaining || 0} turn${(bc.turns_remaining||0) === 1 ? '' : 's'} left</td>
      <td></td>
    </tr>`;
  });

  // ── Available opponents rows ─────────────────────────────────────────────
  let oppRows = '';
  if (opponents.length) {
    opponents.forEach(op => {
      const alreadyQueued = myPending.includes(op.name);
      let btn;
      if (alreadyQueued) {
        btn = `<button disabled style="font-size:11px; padding:1px 6px; opacity:0.5;">Queued</button>`;
      } else if (slotsLeft > 0) {
        btn = `<button onclick="addChallenge(${jsq(w.name)},${jsq(op.name)})"
                       style="font-size:11px; padding:1px 6px;">+ Challenge</button>`;
      } else {
        btn = `<button disabled style="font-size:11px; padding:1px 6px; opacity:0.5;" title="3 challenges already queued">Full</button>`;
      }
      oppRows += `
      <tr style="border-bottom:1px solid #eee;">
        <td style="padding:3px 8px;">${esc(op.name)}</td>
        <td style="padding:3px 8px; color:#555;">${esc(op.teamName)}</td>
        <td style="padding:3px 8px; color:#555;">${esc(op.race)}</td>
        <td style="padding:3px 8px; text-align:center;">${esc(op.record)}</td>
        <td style="padding:3px 8px; text-align:center;">${op.fights}</td>
        <td style="padding:3px 8px;">${btn}</td>
      </tr>`;
    });
  } else {
    oppRows = `<tr><td colspan="6" style="padding:10px; color:#888; text-align:center; font-style:italic;">
      No warriors from other teams fall within this warrior's challenge range.</td></tr>`;
  }

  const rangeDesc = fights === 0
    ? `0 fights (rookie bracket — only other rookies)`
    : `${minFights}–${maxFights} fights`;

  const pendingSection = (myPending.length || bloodList.length) ? `
  <div class="group" style="margin:0 0 12px;">
    <span class="group-label">Pending Challenges — ${slotsUsed}/3 slots used</span>
    <table style="border-collapse:collapse; width:100%; font-size:12px;">
      ${pendingRows}
    </table>
  </div>` : '';

  // Build blood challenges section
  let bloodChallengesSection = '';
  if (activeBloodChallenges.length > 0) {
    let bcRows = '';
    activeBloodChallenges.forEach(bc => {
      const targetName = bc.target_name || '?';
      const deadName = bc.dead_warrior_name || '?';
      const challenger = bc.challenger_name || '(unset)';
      const turnsLeft = bc.turns_remaining || 0;
      const statusStyle = bc.challenger_name ? 'background:#e8f5e9;' : 'background:#fff3e0;';
      
      bcRows += `
      <tr style="${statusStyle} border-bottom:1px solid #eee;">
        <td style="padding:4px 8px; font-weight:bold;">${esc(targetName)}</td>
        <td style="padding:4px 8px; color:#555; font-size:11px;">${esc(deadName)} killed — ${turnsLeft} turn${turnsLeft === 1 ? '' : 's'} left</td>
        <td style="padding:4px 8px;">
          <select onchange="selectBloodChallengeChampion(${jsq(targetName)}, this.value)" 
                  style="font-size:11px; width:140px;">
            <option value="">(unset)</option>
            ${(team.warriors || []).map(w => w && w.name ? 
              `<option value="${esc(w.name)}" ${w.name === bc.challenger_name ? 'selected' : ''}>${esc(w.name)}</option>` 
              : '').join('')}
          </select>
        </td>
      </tr>`;
    });
    
    bloodChallengesSection = `
  <div class="group" style="margin:0 0 12px;">
    <span class="group-label">Blood Challenges — ${activeBloodChallenges.length} Active</span>
    <p style="font-size:11px; color:#555; margin:4px 0 8px;">
      Select a warrior to respond to each blood challenge. The selected warrior will automatically fight the killer when matched.
    </p>
    <table style="border-collapse:collapse; width:100%; font-size:12px;">
      <thead>
        <tr style="border-bottom:2px solid #ccc;">
          <th style="padding:4px 8px; text-align:left; font-weight:600; width:120px;">Killer</th>
          <th style="padding:4px 8px; text-align:left; font-weight:600;">Info</th>
          <th style="padding:4px 8px; text-align:left; font-weight:600;">Selected Challenger</th>
        </tr>
      </thead>
      <tbody>
        ${bcRows}
      </tbody>
    </table>
  </div>`;
  }

  // Build avoid managers section (team-level)
  const avoidMgrs = team.avoid_managers || [];
  const otherManagers = [];
  if (S.challengeTargets) {
    const seen = new Set();
    for (const ow of S.challengeTargets) {
      const mn = ow.manager_name;
      if (mn && !seen.has(mn.toLowerCase()) && !avoidMgrs.some(am => am.toLowerCase() === mn.toLowerCase())) {
        seen.add(mn.toLowerCase());
        otherManagers.push(mn);
      }
    }
    otherManagers.sort((a, b) => a.localeCompare(b));
  }

  let avoidMgrRows = avoidMgrs.length > 0
    ? avoidMgrs.map(m => `
      <div style="padding:4px 8px; margin-bottom:4px; background:#fff3e0; border:1px solid #ffb74d; border-radius:2px; display:flex; justify-content:space-between; align-items:center; gap:8px;">
        <span>${esc(m)}</span>
        <button onclick="removeAvoidManager(${jsq(m)})"
                style="padding:1px 6px; color:#800; border-color:#f88 #800 #800 #f88; font-size:10px;">✕ Remove</button>
      </div>`).join('')
    : '<div style="padding:4px 8px; color:#999; font-style:italic; font-size:11px;">(none set)</div>';

  let avoidMgrDropdown = '';
  if (avoidMgrs.length < 2) {
    if (otherManagers.length > 0) {
      avoidMgrDropdown = `
        <select id="avoid-mgr-sel" onchange="handleAddAvoidManager()" style="width:180px; font-size:11px;">
          <option value="">(select a manager)</option>
          ${otherManagers.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('')}
        </select>`;
    } else {
      avoidMgrDropdown = '<div style="color:#999; font-style:italic; font-size:11px;">Loading managers...</div>';
    }
  } else {
    avoidMgrDropdown = '<div style="color:#999; font-style:italic; font-size:11px;">Maximum (2) already set</div>';
  }

  const avoidManagersSection = `
  <div class="group" style="margin:0 0 12px;">
    <span class="group-label">Avoid Managers — ${avoidMgrs.length}/2 set</span>
    <p style="font-size:11px; color:#555; margin:4px 0 8px;">
      Avoid all challenges from warriors on a specific manager's team (25-30% success rate).
    </p>
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <div>
        <div style="font-size:11px; color:#666; margin-bottom:4px; font-weight:bold;">Currently Avoiding</div>
        ${avoidMgrRows}
      </div>
      <div>
        <div style="font-size:11px; color:#666; margin-bottom:4px; font-weight:bold;">Add Manager to Avoid</div>
        ${avoidMgrDropdown}
      </div>
    </div>
  </div>`;

  // Build avoid warriors section (per-warrior)
  const avoidWarriors = w.avoid_warriors || [];
  const avoidableWarriors = (S.challengeTargets || [])
    .filter(ow => !avoidWarriors.some(aw => aw.toLowerCase() === ow.name.toLowerCase()))
    .sort((a, b) => a.name.localeCompare(b.name));

  const avoidWRows = avoidWarriors.length > 0
    ? avoidWarriors.map(aw => `
      <div style="padding:4px 8px; margin-bottom:4px; background:#fff3e0; border:1px solid #ffb74d; border-radius:2px; display:flex; justify-content:space-between; align-items:center; gap:8px;">
        <span>${esc(aw)}</span>
        <button onclick="removeAvoid(${jsq(w.name)}, ${jsq(aw)})"
                style="padding:1px 6px; color:#800; border-color:#f88 #800 #800 #f88; font-size:10px;">✕ Remove</button>
      </div>`).join('')
    : '<div style="padding:4px 8px; color:#999; font-style:italic; font-size:11px;">(none set)</div>';

  let avoidWDropdown = '';
  if (avoidWarriors.length >= 2) {
    avoidWDropdown = '<div style="color:#999; font-style:italic; font-size:11px;">Maximum (2) already set</div>';
  } else if (avoidableWarriors.length > 0) {
    avoidWDropdown = `
      <select id="avoid-sel" onchange="handleAddAvoid(${jsq(w.name)})" style="width:220px; font-size:11px;">
        <option value="">(select a warrior)</option>
        ${avoidableWarriors.map(ow => `<option value="${esc(ow.name)}">${esc(ow.name)} — ${esc(ow.team_name||'')}</option>`).join('')}
      </select>`;
  } else {
    avoidWDropdown = '<div style="color:#999; font-style:italic; font-size:11px;">Loading warriors...</div>';
  }

  const avoidWarriorsSection = `
  <div class="group" style="margin:0 0 12px;">
    <span class="group-label">Avoid Warriors — ${avoidWarriors.length}/2 set</span>
    <p style="font-size:11px; color:#555; margin:4px 0 8px;">
      Select specific warriors that ${esc(w.name)} will try to avoid being matched against.
    </p>
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <div>
        <div style="font-size:11px; color:#666; margin-bottom:4px; font-weight:bold;">Currently Avoiding</div>
        ${avoidWRows}
      </div>
      <div>
        <div style="font-size:11px; color:#666; margin-bottom:4px; font-weight:bold;">Add Warrior to Avoid</div>
        ${avoidWDropdown}
      </div>
    </div>
  </div>`;

  return `
<div style="padding:12px;">
  <div class="group" style="margin:0 0 12px;">
    <span class="group-label">Challenge Range — ${esc(w.name)}</span>
    <p style="font-size:11px; color:#555; margin:4px 0 0;">
      ${esc(w.name)} has <b>${fights}</b> fight${fights === 1 ? '' : 's'}.
      Eligible targets: <b>${rangeDesc}</b>
      (up to 30% more experience, down to 10% less).
      Up to <b>3</b> challenges may be queued per warrior per turn.
      Challenges are not guaranteed — success depends on warrior presence.
    </p>
  </div>
  ${bloodChallengesSection}
  ${avoidManagersSection}
  ${avoidWarriorsSection}
  ${pendingSection}
  <div class="group" style="margin:0;">
    <span class="group-label">Available to Challenge${opponents.length ? ` — ${opponents.length} warrior${opponents.length === 1 ? '' : 's'} in range` : ''}</span>
    <table style="border-collapse:collapse; width:100%; font-size:12px;">
      <thead>
        <tr style="border-bottom:2px solid #ccc; color:#666; font-size:11px;">
          <th style="padding:4px 8px; text-align:left; font-weight:600;">Name</th>
          <th style="padding:4px 8px; text-align:left; font-weight:600;">Team</th>
          <th style="padding:4px 8px; text-align:left; font-weight:600;">Race</th>
          <th style="padding:4px 8px; text-align:center; font-weight:600;">Record</th>
          <th style="padding:4px 8px; text-align:center; font-weight:600;">Fights</th>
          <th style="padding:4px 8px;"></th>
        </tr>
      </thead>
      <tbody>
        ${oppRows}
      </tbody>
    </table>
  </div>
</div>`;
}

async function addChallenge(warriorName, targetName) {
  const {teamId} = S.sel;
  if (teamId == null) return;
  const r = await API.post('/api/team/challenge', {
    team_id: teamId, warrior_name: warriorName, target_name: targetName, action: 'add',
  });
  if (r.success) {
    S.teams[teamId].challenges = r.challenges;
    render();
  } else {
    alert('Could not add challenge: ' + r.error);
  }
}

async function removeChallenge(warriorName, targetName) {
  const {teamId} = S.sel;
  if (teamId == null) return;
  const r = await API.post('/api/team/challenge', {
    team_id: teamId, warrior_name: warriorName, target_name: targetName, action: 'remove',
  });
  if (r.success) {
    S.teams[teamId].challenges = r.challenges;
    render();
  } else {
    alert('Could not remove challenge: ' + r.error);
  }
}

async function selectBloodChallengeChampion(targetName, challengerName) {
  const {teamId} = S.sel;

async function initReplacement(teamId, wIdx) {
  const r = await API.get('/api/rollup_single');
  S.replacement = {
    teamId, wIdx,
    base    : r.base,
    adds    : {},
    name    : '',
    race    : 'Human',
    gender  : 'Male',
    rerolled: false,   // one-time re-roll flag
  };
  refreshContent();
}

async function rpReroll() {
  if (!S.replacement || S.replacement.rerolled) return;
  if (!confirm('Re-roll your base stats? This is a one-time option — you will have to build from the new roll regardless of the result.')) return;
  const r = await API.get('/api/rollup_single');
  // Mark rerolled and reset everything except slot identity
  S.replacement.base     = r.base;
  S.replacement.adds     = {};
  S.replacement.rerolled = true;
  _rpSync();
  refreshContent();
}

function rpAdj(key, delta) {
  const rs  = S.replacement;
  if (!rs)  return;
  const bv  = rs.base[key] || 8;
  const cur = rs.adds[key] || 0;
  const cap = Math.min(7, 25 - bv);
  const ptsLeft = 16 - Object.values(rs.adds).reduce((a,v) => a+v, 0);
  if (delta > 0 && (cur >= cap || ptsLeft <= 0)) return;
  if (delta < 0 && cur <= 0) return;
  rs.adds[key] = cur + delta;
  _rpSync(); refreshContent();
}

function rpReset() {
  if (!S.replacement) return;
  S.replacement.adds = {};
  _rpSync(); refreshContent();
}

function _rpSync() {
  const rs = S.replacement; if (!rs) return;
  const n = el('rp-name');   if (n)  rs.name   = n.value.trim();
  const r = el('rp-race');   if (r)  rs.race   = r.value;
  const g = el('rp-gender'); if (g)  rs.gender = g.value;
}

async function rpSave(teamId, wIdx) {
  _rpSync();
  const rs = S.replacement;
  if (!rs) return;
  const nm = el('rp-name')?.value?.trim() || rs.name;
  if (!nm) { alert('Enter a name for the replacement warrior.'); return; }
  const adds = rs.adds || {};
  const base = rs.base;
  const body = {
    team_id: teamId, warrior_idx: wIdx,
    name: nm.toUpperCase(), race: rs.race, gender: rs.gender,
    strength    : (base.strength     || 8) + (adds.strength     || 0),
    dexterity   : (base.dexterity    || 8) + (adds.dexterity    || 0),
    constitution: (base.constitution || 8) + (adds.constitution || 0),
    intelligence: (base.intelligence || 8) + (adds.intelligence || 0),
    presence    : (base.presence     || 8) + (adds.presence     || 0),
    size        : (base.size         || 8) + (adds.size         || 0),
  };
  try {
    const r = await API.post('/api/warrior/replace', body);
    if (r.success) {
      S.teams[teamId] = r.team;
      S.replacement   = null;
      S.sel  = {type:'team', teamId};
      S.wTab = 'stats';
      setMsg('Replacement warrior saved — ' + nm + ' joins the team.', 'ok');
      render();
    } else {
      alert('Error: ' + r.error);
    }
  } catch(e) { alert('Connection error: ' + e.message); }
}

function final(ct, i, k) { return (ct.warriors[i].base[k]||0) + (ct.adds[i]?ct.adds[i][k]||0:0); }

    S.account = null; S.teams = {}; S.sel = {type:null};

  if (S.ct) {

/* ============================================================
   LOGIN ACTIONS
   ============================================================ */
async function doLogin() {
  try {
    const name     = el('l-name')?.value?.trim();
    const pass     = el('l-pass')?.value;
    const remember = el('l-remember')?.checked !== false; // default true
    if (!name || !pass) { setMsg('Please enter your manager name and password.', 'err'); render(); return; }

    const r = await API.post('/api/account/login', { manager_name: name, password: pass });
    if (!r.success) { setMsg(r.error, 'err'); render(); return; }

    S.account = {
      id:           r.id,
      manager_name: r.manager_name,
      email:        r.email || '',
      team_ids:     [...new Set(r.team_ids)],
    };
    if (r.run_next_turn) {
      for (const [k, v] of Object.entries(r.run_next_turn))
        S.runNextTurn[Number(k)] = v;
    }
    S.savedRememberMe = remember;

    // Persist remember-me choice to account.json
    const acc = await _ensureAccountLoaded();
    if (acc) {
      acc.remember           = remember;
      acc.password_plaintext = remember ? pass : '';
      await _persistAccount(acc);
    }
    // Update client metadata in IDB (survives browser restart)
    await idbUpdateMeta({
      managerName: name,
      serverUrl: S.serverUrl,
      rememberMe: remember,
      password: remember ? pass : '',
    });

    // Persist any server URL change from the login screen to settings.json
    const settings = await Store.readSettings();
    if (settings.server_url !== S.serverUrl) {
      settings.server_url = S.serverUrl;
      await Store.writeSettings(settings);
    }
    S.league.url = S.serverUrl;

    S.view = 'main'; S.msg = '';
    await loadTeams();
    await loadLeagueSettings();
    // Sync S.account.id with the league manager ID if they differ — the league
    // settings ID is server-authoritative; the local account.json may be stale.
    if (S.league.managerId && S.account && S.account.id !== S.league.managerId) {
      S.account.id = S.league.managerId;
      const _syncAcc = await _ensureAccountLoaded();
      if (_syncAcc) { _syncAcc.id = S.league.managerId; await _persistAccount(_syncAcc); }
    }
    render();
  } catch (err) {
    setMsg('Error: ' + (err.message || err), 'err'); render();
  }
}

async function doCreateAccount() {
  const name  = el('n-name')?.value?.trim()  || '';
  const email = el('n-email')?.value?.trim() || '';
  const pass  = el('n-pass')?.value          || '';
  const pass2 = el('n-pass2')?.value         || '';

  if (!name)          { setMsg('Manager name is required.', 'err'); render(); return; }
  if (!pass)          { setMsg('Password is required.', 'err'); render(); return; }
  if (pass.length < 4){ setMsg('Password must be at least 4 characters.', 'err'); render(); return; }
  if (pass !== pass2) { setMsg('Passwords do not match.', 'err'); render(); return; }

  try {
    // Step 1 — server-side uniqueness check
    const check = await API.post('/api/check_manager_name', { manager_name: name });
    if (!check || check.available === false) {
      setMsg(check?.error || 'That manager name is already taken. Pick another.', 'err');
      render(); return;
    }

    // Step 2 — register on the league server to get a unique account ID
    const reg = await API.post('/api/register', { manager_name: name, password: pass });
    if (!reg || !reg.success) {
      setMsg(reg?.error || 'Registration failed.', 'err'); render(); return;
    }

    // Step 3 — persist to FSA account.json with a locally-derived hash
    const salt = randomHex(16);
    const pw_hash = await sha256Hex(salt + pass);
    const account = {
      id:            reg.manager_id,
      manager_name:  reg.manager_name,
      email:         email,
      salt:          salt,
      password_hash: pw_hash,
      team_ids:      [],
      run_next_turn: {},
      remember:      true,
      password_plaintext: pass,
    };
    await Store.writeAccount(account);
    S._accountCache = account;
    S.account = { id: account.id, manager_name: account.manager_name, email, team_ids: [] };

    // Update client metadata
    await idbUpdateMeta({
      managerName: name,
      serverUrl: S.serverUrl,
      rememberMe: true,
      password: pass,
    });

    // Step 4 — persist league connection info so upload/download work right away
    const settings = await Store.readSettings();
    settings.server_url    = S.serverUrl;
    settings.manager_id    = reg.manager_id;
    settings.manager_name  = reg.manager_name;
    settings.password      = pass;
    await Store.writeSettings(settings);
    S.league.url         = S.serverUrl;
    S.league.managerId   = reg.manager_id;
    S.league.managerName = reg.manager_name;
    S.league.password    = pass;

    S.view = 'main';
    S.msg  = '';
    render();

    // Step 5 — auto-download a fresh random team roll so the user is ready
    // to build their first team right away (matches the design the user described).
    initCreateTeam();
  } catch (err) {
    setMsg('Could not reach the league server: ' + (err.message || err), 'err'); render();
  }
}

/* ============================================================
   SAVE WARRIOR CHANGES
   ============================================================ */
async function doSaveWarrior() {
  // Use _pendingWarrior if available (handles the case where S.sel moved
  // to a different warrior before the 700ms debounce fired).
  const src = _pendingWarrior || S.sel;
  const {teamId, wIdx} = src;
  if (teamId == null || wIdx == null) return;
  // Hard gate: if the stats-tab inputs aren't in the DOM (user moved to a
  // different sub-tab like Fights/Fight Options/Archives while a 700ms
  // auto-save timer was still pending), bail. Otherwise we'd read a bunch of
  // nulls and save `trains: []`, `armor: 'None'`, etc. — wiping the warrior's
  // equipment and training. The switch-warrior path calls flushSave() *before*
  // the DOM is rebuilt, so this guard doesn't interfere with that case.
  if (!el('sel-armor')) { console.debug('[save] skipped — stats-tab DOM not present'); return; }

  // Collect strategies — numbered rows only saved if trigger is set
  const strats = [];
  for (let i = 0; i < 5; i++) {
    const trigger = getSelectVal(`#strat-body select[data-si="${i}"][data-sf="trigger"]`);
    if (!trigger || trigger === 'None') continue;
    const style    = getSelectVal(`#strat-body select[data-si="${i}"][data-sf="style"]`)    || 'Strike';
    const actRaw   = getInputVal(`#strat-body input[data-si="${i}"][data-sf="activity"]`);
    const activity = (actRaw !== '' && actRaw !== null) ? parseInt(actRaw) : 5;
    const aim      = getSelectVal(`#strat-body select[data-si="${i}"][data-sf="aim_point"]`)    || 'None';
    const def      = getSelectVal(`#strat-body select[data-si="${i}"][data-sf="defense_point"]`) || 'None';
    strats.push({trigger, style, activity, aim_point:aim, defense_point:def});
  }
  // D row — trigger is always "Always (Default Loop)" regardless of DOM
  const dStyle    = getSelectVal('#strat-body select[data-si="D"][data-sf="style"]')    || 'Strike';
  const dActRaw   = getInputVal('#strat-body input[data-si="D"][data-sf="activity"]');
  const dActivity = (dActRaw !== '' && dActRaw !== null) ? parseInt(dActRaw) : 5;
  const dAim      = getSelectVal('#strat-body select[data-si="D"][data-sf="aim_point"]')    || 'None';
  const dDef      = getSelectVal('#strat-body select[data-si="D"][data-sf="defense_point"]') || 'None';
  strats.push({trigger:'Always (Default Loop)', style:dStyle, activity:dActivity, aim_point:dAim, defense_point:dDef});

  // Training
  const trains = [
    getSelectVal('#sel-t1'), getSelectVal('#sel-t2'), getSelectVal('#sel-t3')
  ].filter(t => t && t !== '—');

  const body = {
    team_id     : teamId,
    warrior_idx : wIdx,
    armor       : el('sel-armor')?.value||'None',
    helm        : el('sel-helm')?.value||'None',
    primary_weapon   : el('sel-prim')?.value||'Open Hand',
    secondary_weapon : el('sel-sec')?.value||'Open Hand',
    backup_weapon    : el('sel-bkp')?.value||'None',
    trains,
    strategies  : strats,
  };

  try {
    const r = await API.put('/api/warrior', body);
    if (r.success) {
      _pendingWarrior = null;  // clear after successful save
      await reloadTeam(teamId);
      refreshContent();
    } else {
      alert('Save failed: ' + r.error);
    }
  } catch (err) {
    alert('Connection error: ' + err.message);
  }
}

function getSelectVal(selector) { const e = document.querySelector(selector); return e ? e.value : null; }
function getInputVal(selector)  { const e = document.querySelector(selector); return e ? e.value : null; }

// Debounced auto-save: any change schedules a save 700ms later.
// _pendingWarrior tracks which warrior the pending save belongs to,
// so navigation to a different warrior flushes the right data first.
let _saveTimer      = null;
let _pendingWarrior = null;  // {teamId, wIdx} of the pending save

function scheduleAutoSave() {
  // Record which warrior this save belongs to
  if (S.sel && S.sel.type === 'warrior') {
    _pendingWarrior = {teamId: S.sel.teamId, wIdx: S.sel.wIdx};
  }
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(doSaveWarrior, 700);
}

function fillAllTrains(slot) {
  const val = el(`sel-t${slot}`)?.value;
  if (val === null || val === undefined) return;
  ['sel-t1', 'sel-t2', 'sel-t3'].forEach(id => {
    const s = el(id);
    if (s) s.value = val;
  });
  scheduleAutoSave();
}

// Flush any pending save immediately (called before navigation)
async function flushSave() {
  if (!_saveTimer) return;
  clearTimeout(_saveTimer);
  _saveTimer = null;
  await doSaveWarrior();
}

/* ============================================================
   CREATE TEAM ACTIONS
   ============================================================ */
async function initCreateTeam() {
  // Load game data if needed
  if (!S.gd) { const r = await API.get('/api/game_data'); S.gd = r; }
  // Only fetch fresh rollups if we don't already have a pending creation session.
  // This prevents players from cancelling out and re-rolling for better stats.
  if (!S.ct) {
    const r = await API.get('/api/rollup');
    S.ct = {
      teamName : '',
      sel      : 0,
      warriors : r.rolls.map(base => ({ base, name:'', race:'Human', gender:'Male' })),
      adds     : r.rolls.map(() => ({ strength:0, dexterity:0, constitution:0, intelligence:0, presence:0, size:0 })),
      saved    : [false, false, false, false, false],
    };
  }
  S.view = 'create_team';
  S.msg  = '';
  render();
}

function ctAdjust(key, delta) {
  const ct  = S.ct;
  const i   = ct.sel;
  const cur = ct.adds[i][key] || 0;
  const base= ct.warriors[i].base[key];
  const cap = Math.min(7, 25 - base);
  const ptsUsed = ATTR_KEYS.reduce((a,k) => a + (ct.adds[i][k]||0), 0);
  const ptsLeft = 16 - ptsUsed;

  if (delta > 0 && (cur >= cap || ptsLeft <= 0)) return;
  if (delta < 0 && cur <= 0) return;

  ct.adds[i][key] = cur + delta;
  // Sync name input if open
  const nEl = el('ct-wname');
  if (nEl) ct.warriors[i].name = nEl.value;
  render();
}

function doCtReset() {
  const i = S.ct.sel;
  ATTR_KEYS.forEach(k => { S.ct.adds[i][k] = 0; });
  render();
}

function doCtSaveWarrior() {
  const ct = S.ct;
  if (!ct) return;
  const i = ct.sel;
  // Sync all fields — name is NOT required here, validated at team save
  // Grid name (ct-name-i) is read first; editor name (ct-wname) takes priority if non-empty,
  // so the user can type a name in either place and it will be captured correctly.
  const rEl  = el('ct-wrace');    if (rEl)  ct.warriors[i].race   = rEl.value;
  const gEl  = el('ct-wgender'); if (gEl)  ct.warriors[i].gender = gEl.value;
  const gNEl = el(`ct-name-${i}`); if (gNEl && gNEl.value.trim()) ct.warriors[i].name = gNEl.value.trim();
  const nEl  = el('ct-wname');    if (nEl && nEl.value.trim())    ct.warriors[i].name = nEl.value.trim();
  // Mark this slot confirmed — unlocks team name when all 5 done
  if (!ct.saved) ct.saved = [false,false,false,false,false];
  ct.saved[i] = true;
  render();
}

async function doSaveTeam() {
  // Capture team name BEFORE doCtSaveWarrior() re-renders the page and destroys the input
  const tNameEl = el('ct-team-name');
  if (tNameEl) S.ct.teamName = tNameEl.value.trim();

  doCtSaveWarrior();  // save current warrior first (triggers render)
  const ct = S.ct;

  // Sync names from grid
  for (let i = 0; i < 5; i++) {
    const gNEl = el(`ct-name-${i}`);
    if (gNEl) ct.warriors[i].name = gNEl.value.trim();
  }

  const tName = (ct.teamName || '').trim();
  if (!tName) { setMsg('Please enter a team name.', 'err'); render(); return; }

  // All names required at final save (can be unnamed during stat allocation)
  for (let i = 0; i < 5; i++) {
    const nm = (ct.warriors[i].name||'').trim();
    if (!nm) {
      setMsg(`Warrior ${i+1} needs a name. Click that row and enter one.`, 'err');
      S.ct.sel = i;  // jump user to the unnamed slot
      render(); return;
    }
  }

  // Build warrior data
  const warriors = ct.warriors.map((w, i) => {
    const a = ct.adds[i] || {};
    return {
      name        : w.name.toUpperCase(),
      race        : w.race,
      gender      : w.gender,
      strength    : w.base.strength    + (a.strength||0),
      dexterity   : w.base.dexterity   + (a.dexterity||0),
      constitution: w.base.constitution+ (a.constitution||0),
      intelligence: w.base.intelligence+ (a.intelligence||0),
      presence    : w.base.presence    + (a.presence||0),
      size        : w.base.size        + (a.size||0),
    };
  });

  try {
    const r = await API.post('/api/team/create', {
      manager_id  : S.league.managerId || S.account.id,
      password    : S.league.password || '',
      manager_name: S.account.manager_name,
      team_name   : tName,
      warriors,
    });
    if (!r.success) { setMsg(r.error || 'Could not create team.', 'err'); render(); return; }

    // Save the returned team to the local FSA folder.
    await Store.writeTeam(r.team);

    // Update the on-disk account.json with the new team_id (or swap).
    const acc = (await _ensureAccountLoaded()) || {};
    acc.team_ids = acc.team_ids || [];
    if (S.replacingTeam) {
      const rt = S.replacingTeam;
      const idx = acc.team_ids.indexOf(rt.old_team_id);
      if (idx !== -1) acc.team_ids[idx] = r.team_id;
      else acc.team_ids.push(r.team_id);
      delete S.teams[rt.old_team_id];
      await Store.deleteTeam(rt.old_team_id);
      // Reflect in in-memory account state too
      const sidx = S.account.team_ids.indexOf(rt.old_team_id);
      if (sidx !== -1) S.account.team_ids[sidx] = r.team_id;
      else S.account.team_ids.push(r.team_id);
      S.replacingTeam = null;
    } else {
      if (!acc.team_ids.includes(r.team_id)) acc.team_ids.push(r.team_id);
      if (!S.account.team_ids.includes(r.team_id)) S.account.team_ids.push(r.team_id);
    }
    await _persistAccount(acc);

    S.teams[r.team_id] = r.team;
    S.expanded[r.team_id] = true;
    S.sel = { type:'team', teamId: r.team_id };
    S.view = 'main';
    S.ct = null;
    S.msg = '';
    render();
  } catch (err) {
    setMsg('Could not reach the league server: ' + (err.message || err), 'err'); render();
  }
}

/* ============================================================
   TURN RESULTS VIEW
   ============================================================ */
function buildTurnResults() {
  const tr  = S.turnResults;
  if (!tr) return '<div style="padding:20px;">No results.</div>';

  const bouts = tr.bouts || [];
  const wins   = bouts.filter(b => b.result === 'WIN').length;
  const losses = bouts.filter(b => b.result === 'LOSS').length;
  const draws  = bouts.filter(b => b.result === 'DRAW').length;

  let rows = '';
  bouts.forEach((b, i) => {
    const resColor = b.result==='WIN'  ? '#060'
                   : b.result==='LOSS' ? '#800' : '#555';
    const slainTag   = b.warrior_slain   ? ' <b style="color:#800; font-size:10px;">(SLAIN)</b>'    : '';
    const killedTag  = b.opponent_slain  ? ' <b style="color:#060; font-size:10px;">(KILLED)</b>'   : '';
    const ftLabel    = (b.fight_type && !['standard','rivalry','peasant','monster'].includes(b.fight_type))
                       ? b.fight_type.replace(/_/g,' ') : '';
    const typeTag    = ftLabel ? `<span style="color:#888; font-size:10px;">[${esc(ftLabel)}]</span>` : '';
    const trainLines = (b.training||[]).map(t => {
      if (t.includes('improved:') || t.includes('trained:'))
        return `<span style="color:#060">${esc(t)}</span>`;
      if (t.includes('no progress') || t.includes('did not train'))
        return `<span style="color:#888">${esc(t)}</span>`;
      return esc(t);
    }).join('<br>');
    const fid = b.fight_id;
    const viewBtn = fid
      ? `<button class="sm" onclick="openNarrative(${fid},${S.turnResults?.turn_number||0})">View Fight</button>`
      : `<span style="color:#aaa; font-size:10px;">no log</span>`;

    rows += `<tr style="${i%2===0?'background:#f5f4f0;':''}">
      <td style="padding:3px 8px;">${esc(b.warrior_name)}${slainTag}</td>
      <td style="padding:3px 8px; font-weight:bold; color:${resColor};">${b.result}${killedTag}</td>
      <td style="padding:3px 8px;">${esc(b.opponent_name)}<br><span style="color:#888;font-size:10px;">${esc(b.opponent_team)}</span></td>
      <td style="padding:3px 8px; text-align:center;">${esc(b.opponent_race)}</td>
      <td style="padding:3px 8px; text-align:center;">${b.minutes} min ${typeTag}</td>
      <td style="padding:3px 8px; font-size:10px; color:#333;">${trainLines||'—'}</td>
      <td style="padding:3px 8px;">${viewBtn}</td>
    </tr>`;
  });

  // Celebration banner for any warrior who ascended to Monsterdom this turn
  const ascensions = bouts.filter(b => b.ascension || (b.fight_type === 'monster' && b.opponent_slain));
  let ascensionBanner = '';
  if (ascensions.length) {
    const names = ascensions.map(b => `<b>${esc(b.warrior_name)}</b> (slew ${esc(b.opponent_name)})`).join('<br>');
    ascensionBanner = `
    <div style="margin-bottom:12px; padding:12px 14px; background:linear-gradient(90deg,#fef3d0,#fff6e0,#fef3d0); border:2px solid #a57; border-left:6px solid #844; border-right:6px solid #844;">
      <div style="font-size:14px; font-weight:bold; color:#844; margin-bottom:6px;">
        👹 ASCENSION TO MONSTERDOM! 👹
      </div>
      <div style="font-size:12px; color:#422; line-height:1.5;">
        ${names}<br>
        <span style="color:#666; font-size:11px;">
          Slew a monster and has been absorbed into The Monsters roster.
          A replacement warrior slot is now available — visit the warrior's Replacement tab to roll up a recruit.
        </span>
      </div>
    </div>`;
  }

  return `
<div style="height:100%; display:flex; flex-direction:column; overflow:hidden;">
  ${buildMenuBar()}
  <div style="flex:1; overflow-y:auto; padding:8px;">

  <div style="font-size:13px; font-weight:bold; margin-bottom:6px;">
    TURN ${tr.turn_number} RESULTS &mdash; ${esc(tr.team ? tr.team.team_name : '')}
  </div>
  ${ascensionBanner}
  <div style="margin-bottom:10px; display:flex; gap:20px; font-size:12px;">
    <span style="color:#060; font-weight:bold;">Wins: ${wins}</span>
    <span style="color:#800; font-weight:bold;">Losses: ${losses}</span>
    <span style="color:#555;">Draws: ${draws}</span>
    <span style="color:#444;">${bouts.length} fights total</span>
  </div>

  <table class="grid" style="font-size:11px; margin-bottom:12px;">
    <thead>
      <tr>
        <th style="min-width:130px; text-align:left; padding:3px 8px;">Warrior</th>
        <th style="width:60px;">Result</th>
        <th style="min-width:160px; text-align:left; padding:3px 8px;">Opponent</th>
        <th style="width:70px;">Race</th>
        <th style="width:90px;">Duration</th>
        <th style="min-width:160px; text-align:left; padding:3px 8px;">Training</th>
        <th style="width:80px;">Narrative</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>

  <div style="display:flex; gap:8px;">

/* ============================================================
   NARRATIVE OVERLAY
   ============================================================ */
function _damageClass(text) {
  const t = text.toLowerCase();
  // Light — superficial, grazes, nicks, barely connects
  if (/superficial|shallow|barely|minor|skim|kisses|merely|beads|sting|prick|lightly|scrapes|nicks|glances|slap|little real harm|little more than|little effect/.test(t))
    return 'nar-damage-light';
  // Heavy — horrific, savage, bone-breaking, devastating
  if (/horrific|terrible|savage|gruesome|brutal|devastating|shattering|violently|gaping|ghastly|erupts|sprays wildly|impales|skewered|ragged|bone-|nearly severing|nearly takes|wide open|ruin|pulps/.test(t))
    return 'nar-damage-heavy';
  // Default — medium
  return 'nar-damage-medium';
}

function narrativeToHtml(text) {
  // The narrative has 3 === separators:
  //   ===1 … ===2  →  matchup header  (NAME vs NAME / team / race)
  //   ===2 … ===3  →  prose + strategy table
  //   after ===3   →  blow-by-blow fight narrative
  const lines = text.split('\n');
  const out   = [];
  let sepCount    = 0;
  let matchupDone = false;
  let inStrat     = false;  // inside the strategy <table>

  // Column positions detected dynamically from the TRIGGER header line.
  // This handles both old saves (32-char trigger column) and new (42-char).
  let _cols = null;

  function detectCols(hdr) {
    const fs  = hdr.indexOf('FIGHTING STYLE');
    const lv  = hdr.indexOf('LEVEL', fs + 14); // skip past 'FIGHTING STY…'
    const aim = hdr.indexOf('AIMING POINT');
    const def = hdr.indexOf('DEFENSE POINT');
    _cols = { fs, lv, aim, def };
  }

  function parseStrat(ln) {
    if (!_cols) return { trigger: ln, style: '', level: '', aim: '', def: '' };
    const { fs, lv, aim, def } = _cols;
    return {
      trigger: ln.slice(0, fs).trim(),
      style:   ln.slice(fs, lv).trim(),
      level:   ln.slice(lv, aim - 2).trim(),  // level is 5 chars; -2 skips the 2-space gap
      aim:     ln.slice(aim, def).trim(),
      def:     ln.slice(def).trim(),
    };
  }

  function closeStrat() {
    if (inStrat) { out.push('</tbody></table>'); inStrat = false; }
  }

  for (const ln of lines) {
    // === separator ─────────────────────────────────────────────────
    if (/^={5,}/.test(ln)) {
      closeStrat();
      sepCount++;
      out.push('<div class="nar-sep"></div>');
      if (sepCount === 1) matchupDone = false;
      continue;
    }

    // ── Section 1: matchup header (===1 … ===2) ────────────────────
    if (sepCount === 1) {
      if (!matchupDone) {
        if (!ln.trim()) { matchupDone = true; out.push('<div style="height:8px"></div>'); continue; }
        const vsIdx = ln.indexOf('   vs   ');
        if (vsIdx >= 0) {
          const L = ln.slice(0, vsIdx).trim();
          const R = ln.slice(vsIdx + 8).trim();
          if (/\(\d+[-–]\d+/.test(L)) {
            // Warrior name line — bold + larger
            const fw = p => {
              const m = p.match(/^(.*?)\s+(\([^)]+\))$/);
              return m
                ? `<span class="nar-wname">${esc(m[1])}</span> <span class="nar-wrec">${esc(m[2])}</span>`
                : `<span class="nar-wname">${esc(p)}</span>`;
            };
            out.push(`<div class="nar-row" style="margin:6px 0"><span class="nar-col-l">${fw(L)}</span><span class="nar-col-vs">vs</span><span class="nar-col-r">${fw(R)}</span></div>`);
          } else {
            // Team / race lines — same column structure, empty vs cell so columns align
            out.push(`<div class="nar-row"><span class="nar-col-l">${esc(L)}</span><span class="nar-col-vs"></span><span class="nar-col-r">${esc(R)}</span></div>`);
          }
        } else {
          out.push(`<div class="nar-line">${esc(ln)}</div>`);
        }
      }
      continue;
    }

    // ── Section 2: prose + strategy table (===2 … ===3) ───────────
    if (sepCount === 2) {
      if (/^-{5,}/.test(ln)) continue; // skip the --- under TRIGGER header

      if (!ln.trim()) { closeStrat(); out.push('<div style="height:6px"></div>'); continue; }

      // Strategy table header — detect column positions first, then parse
      if (/^TRIGGER\s/.test(ln.trim())) {
        detectCols(ln);
        const c = parseStrat(ln);
        inStrat = true;
        out.push(
          `<table class="nar-strat-tbl"><thead><tr>` +
          `<th class="nar-st-trig">${esc(c.trigger)}</th>` +
          `<th class="nar-st-style">${esc(c.style)}</th>` +
          `<th class="nar-st-level">${esc(c.level)}</th>` +
          `<th class="nar-st-aim">${esc(c.aim)}</th>` +
          `<th>${esc(c.def)}</th>` +
          `</tr></thead><tbody>`
        );
        continue;
      }

      // Strategy data rows
      if (inStrat) {
        const c = parseStrat(ln);
        out.push(
          `<tr>` +
          `<td class="nar-st-trig">${esc(c.trigger)}</td>` +
          `<td class="nar-st-style">${esc(c.style)}</td>` +
          `<td class="nar-st-level">${esc(c.level)}</td>` +
          `<td class="nar-st-aim">${esc(c.aim)}</td>` +
          `<td>${esc(c.def)}</td>` +
          `</tr>`
        );
        continue;
      }

      // Prose lines — bold warrior name prefix + any ALL-CAPS items (armor, weapons)
      const pm = ln.match(/^([A-Z][A-Z ']{2,}?)(\s+(?:is |weighs |Has |enters |fights |has ))/);
      if (pm) {
        const name = pm[1];
        const rest = ln.slice(name.length);
        const restHtml = esc(rest).replace(/\b([A-Z]{2,}(?:[-\s][A-Z]{2,})*)\b/g, '<strong>$1</strong>');
        out.push(`<div class="nar-prose"><strong>${esc(name)}</strong>${restHtml}</div>`);
      } else {
        out.push(`<div class="nar-prose">${esc(ln)}</div>`);
      }
      continue;
    }

    // ── Section 3: fight narrative (after ===3) ────────────────────
    if (sepCount >= 3) {
      if (/^\*\*\*.*\*\*\*$/.test(ln))                                         { out.push(`<div class="nar-event">${esc(ln)}</div>`);   continue; }
      if (/^MINUTE\s+\d+/.test(ln.trim()))                                      { out.push(`<div class="nar-minute">${esc(ln)}</div>`);  continue; }
      if (/SLAIN/.test(ln) || /collapses/i.test(ln) || /\bfalls\b/i.test(ln)) { out.push(`<div class="nar-death">${esc(ln)}</div>`);   continue; }
      if (/wins/i.test(ln) && (/judge/i.test(ln) || /victory/i.test(ln)))      { out.push(`<div class="nar-win">${esc(ln)}</div>`);     continue; }
      if (/trained/i.test(ln) || /observed/i.test(ln))                         { out.push(`<div class="nar-training">${esc(ln)}</div>`); continue; }
      if (/^\s+HP/.test(ln) || /HP:/.test(ln) || /damage/i.test(ln))           { out.push(`<div class="nar-hp">${esc(ln)}</div>`);      continue; }
      if (!ln.trim())                                                            { out.push('<br>');                                       continue; }
      // Damage result lines arrive with 3 leading spaces from narrative.py
      if (/^   \S/.test(ln))                                                    { out.push(`<div class="${_damageClass(ln)}">${esc(ln.trim())}</div>`); continue; }
      out.push(`<div class="nar-line">${esc(ln)}</div>`);
    }
  }
  closeStrat();
  return out.join('');
}

async function openNarrative(fightId, turnNum) {
  // 1. Try local save first (for locally-run turns)
  try {
    const r = await API.get(`/api/fight/narrative?id=${fightId}`);
    if (r.success) {
      S.narrative = { text: r.narrative, title: `Fight #${fightId}` };
      showNarrativeOverlay();
      return;
    }
  } catch(e) {}

  // 2. Not found locally — try the league server directly (for downloaded turns)
  const lg = S.league;
  if (lg?.url && lg?.managerId && turnNum) {
    try {
      const url = `${lg.url}/api/fight_log` +
        `?turn=${turnNum}` +
        `&fight_id=${fightId}` +
        `&manager_id=${encodeURIComponent(lg.managerId)}` +
        `&password=${encodeURIComponent(lg.password||'')}`;
      const ctrl = new AbortController();
      const tmo  = setTimeout(() => ctrl.abort(), 15000);
      const res  = await fetch(url, {signal: ctrl.signal});
      clearTimeout(tmo);
      const d = await res.json();
      if (d.success) {
        S.narrative = { text: d.narrative, title: `Fight #${fightId} (Turn ${turnNum})` };
        showNarrativeOverlay();
        return;
      }
    } catch(e) {}
  }

  alert('Fight log not available. The narrative may not have been saved for this fight.');
}

function closeNarrative() {
  S.narrative = null;
  hideNarrativeOverlay();
}

      S.newsletters = null;     // invalidate newsletter cache
      S.newsletterText = null;  // force fresh load on next view
      S.turnResults = r;

      S.scout.loaded     = false;
      S.scout.selections = [];
      S.scout.slotsLeft  = 3;

    setMsg('Connection error: ' + err.message, 'err');
  }

async function openNewsletter() {
  S.sel = {type:'newsletter'};
  S.wTab = 'stats';
  // Always re-fetch the list so newly produced turns appear
  const prevList = S.newsletters || [];
  const r = await API.get('/api/newsletters');
  S.newsletters = r.turns || [];
  const latest = S.newsletters.length ? S.newsletters[S.newsletters.length - 1] : null;
  const prevLatest = prevList.length ? prevList[prevList.length - 1] : null;
  // If a newer turn exists, or nothing is selected, jump to latest
  if (latest && (!S.newsletterTurn || (prevLatest !== null && latest > prevLatest))) {
    S.newsletterTurn = latest;
    S.newsletterText = null;
  }
  if (S.newsletterTurn && !S.newsletterText) {
    await loadNewsletterTurn(S.newsletterTurn);
  }
  refreshContent();
}

async function loadNewsletterTurn(turn) {
  S.newsletterTurn = turn;
  S.newsletterText = null;
  refreshContent();   // show loading state
  const r = await API.get('/api/newsletter?turn=' + turn);
  if (r.success) {
    S.newsletterText = r.text;
  } else {
    S.newsletterText = '(Newsletter not available for turn ' + turn + ')';
  }
  refreshContent();
}

async function setNewsletterVoice(voice) {
  S.newsletterVoice = voice;
  await API.post('/api/newsletter/voice', {voice});
}

function buildNewsletterPanel() {
  const turns = S.newsletters || [];
  const cur   = S.newsletterTurn;
  const text  = S.newsletterText;
  const voice = S.newsletterVoice || 'snide';

  // Turn selector
  const opts = turns.map(t =>
    `<option value="${t}" ${t===cur?'selected':''}>Turn ${t}</option>`
  ).join('');

  const selector = turns.length
    ? `<select onchange="loadNewsletterTurn(parseInt(this.value))" style="font-size:11px;">${opts}</select>`
    : `<span style="color:#888;font-size:11px;">No newsletters yet — run a turn first.</span>`;

  let body = '';
  if (!turns.length) {
    body = '<div style="padding:20px; color:#666; font-size:11px;">No newsletters available yet. Run a turn or download results first.</div>';
  } else if (text !== null) {
    body = `<pre style="font-family:Courier New,monospace; font-size:11px; line-height:1.5;
                   white-space:pre-wrap; word-wrap:break-word; margin:0; padding:8px;
                   background:#fff; color:#111; overflow:auto; max-height:calc(100vh - 120px);"
       >${esc(text)}</pre>`;
  } else {
    body = '<div style="padding:20px; color:#666; font-size:11px;">Loading...</div>';
  }

  return `
<div style="display:flex; flex-direction:column; height:100%; overflow:hidden;">
  <div style="padding:4px 8px; background:#d4d0c8; border-bottom:1px solid #808080;
              display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <b style="font-size:11px;">📜 Arena Newsletter</b>
    ${selector}
    <button style="margin-left:auto; font-size:11px;" onclick="openNewsletter()">↺ Refresh</button>
    <button style="font-size:11px;" onclick="S.sel={type:null};refreshContent()">✕ Close</button>
  </div>
  <div style="flex:1; overflow:auto;">
    ${body}
  </div>
</div>`;
}

async function loadLeagueSettings() {
  try {
    const name = S.account?.manager_name || '';
    const r = await API.get('/api/league_settings?manager_name=' + encodeURIComponent(name));
    if (r.success && r.settings) Object.assign(S.league, r.settings);
    
    // Fetch feature flags and last upload timestamp from league server if connected
    if (S.league.url && S.league.managerId) {
      // Fetch feature flags (public, no auth needed)
      try {
        const flagResp = await fetch(S.league.url + '/api/flags');
        if (flagResp.ok) {
          const flagData = await flagResp.json();
          if (flagData.success) {
            S.league.flags = {
              show_favorite_weapon: flagData.show_favorite_weapon || false,
              show_luck_factor:     flagData.show_luck_factor     || false,
              show_max_hp:          flagData.show_max_hp          || false,
            };
            refreshContent();
          }
        }
      } catch(e) { /* silent */ }

      try {
        const statusResp = await fetch(S.league.url + '/api/status');
        if (statusResp.ok) {
          const statusData = await statusResp.json();
          if (statusData.managers) {
            const mgr = statusData.managers.find(m => m.manager_id === S.league.managerId);
            if (mgr && mgr.last_upload_timestamp) {
              // Convert timestamp string (YYYY-MM-DD HH:MM:SS) to toLocaleString() format
              try {
                const uploadDate = new Date(mgr.last_upload_timestamp.replace(' ', 'T'));
                S.league.lastUpload = uploadDate.toLocaleString();
              } catch(e) {
                S.league.lastUpload = mgr.last_upload_timestamp; // fallback to raw string
              }
            }
          }
        }
      } catch(e) { /* silent — don't interrupt if status fetch fails */ }
    }
  } catch(e) {}
}

function _leagueMsg(text, cls) {
  const m = el('lm-msg');
  if (!m) return;

async function doSaveLeagueSettings() {
  const url  = (el('lm-url')?.value  || '').trim().replace(/\/+$/, '');
  const name = (el('lm-name')?.value || '').trim();
  const pw   = (el('lm-pw')?.value   || '').trim();
  if (!url)  { _leagueMsg('Server URL is required.', 'err'); return; }
  if (!name) { _leagueMsg('Manager name is required.', 'err'); return; }

  // First-time: auto-register with the league server before saving
  if (!S.league.managerId) {
    if (!pw) { _leagueMsg('Password is required for first-time registration.', 'err'); return; }
    _leagueMsg('Registering with league server...', 'ok');
    try {
      const r = await fetch(url + '/api/register', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({manager_name: name, password: pw})
      });
      const d = await r.json();
      if (!d.success) { _leagueMsg('Registration failed: ' + d.error, 'err'); return; }
      S.league.managerId   = d.manager_id;
      S.league.managerName = d.manager_name;
      S.league.password    = pw;
      S.league.url         = url;
    } catch(e) { _leagueMsg('Could not reach league server: ' + e.message, 'err'); return; }
  } else {
    S.league.url         = url;
    S.league.managerName = name;
    if (pw) S.league.password = pw;
  }

  // Save to local file so it survives page reload
  try {
    await API.post('/api/league_settings', {
      manager_name: S.account?.manager_name || S.league.managerName || '',
      url,
      managerId  : S.league.managerId,
      managerName: S.league.managerName,
      password   : S.league.password || '',
    });
    _leagueMsg(
      S.league.managerId
        ? '✓ Registered as ' + S.league.managerName + ' — settings saved.'
        : 'Settings saved.',
      'ok'
    );
    setTimeout(() => { el('league-modal')?.remove(); render(); }, 900);
  } catch(e) { _leagueMsg('Could not save settings: ' + e.message, 'err'); }
}

async function doLeagueRegister() {
  const url  = (el('lm-url')?.value  || '').trim().replace(/\/+$/, '');
  const name = (el('lm-name')?.value || '').trim();
  const pw   = (el('lm-pw')?.value   || '').trim();
  if (!url || !name || !pw) { _leagueMsg('URL, manager name and password are all required.', 'err'); return; }
  _leagueMsg('Registering...', 'ok');
  try {
    const r = await fetch(url + '/api/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({manager_name: name, password: pw})
    });
    const d = await r.json();
    if (d.success) {

function _showDownloadProgress(steps, currentIdx, error) {
  // Remove any existing dialog
  const old = document.getElementById('dl-progress-modal');
  if (old) old.remove();

  const allDone  = currentIdx >= steps.length && !error;
  const hasFailed= !!error;

  let rows = '';
  steps.forEach((label, i) => {
    let icon, color;
    if (hasFailed && i === currentIdx) {
      icon = '✗'; color = '#c00';
    } else if (i < currentIdx || allDone) {
      icon = '✓'; color = '#080';
    } else if (i === currentIdx) {
      icon = '⟳'; color = '#840';
    } else {
      icon = '☐'; color = '#aaa';
    }
    rows += `<tr>
      <td style="padding:3px 8px; color:${color}; font-size:13px;">${icon}</td>

async function doLeagueDownloadAll() {
  const lg = S.league;
  if (!lg.url || !lg.managerId) { setMsg('Configure league settings first.', 'err'); return; }
  const pw = lg.password || prompt('League password:');
  if (!pw) return;
  lg.password = pw;

  _showDownloadProgress(_DL_STEPS, 0, null);
  const tick = (i) => _showDownloadProgress(_DL_STEPS, i, null);
  const fail = (msg, i) => _showDownloadProgress(_DL_STEPS, i, msg);

  try {
    // ── Step 1-2: Connect directly to league server from the browser ──────
    // This bypasses the Python proxy entirely — no urllib timeout possible.
    tick(1); await new Promise(r => setTimeout(r, 60));
    tick(2); await new Promise(r => setTimeout(r, 60));
    tick(3); // Authenticating + fetching

    const resultsUrl = `${lg.url}/api/results` +
      `?manager_id=${encodeURIComponent(lg.managerId)}` +
      `&password=${encodeURIComponent(pw)}`;

    let resultsResp;
    try {
      const ctrl = new AbortController();
      const tmo  = setTimeout(() => ctrl.abort(), 120000); // 2 min timeout
      const res  = await fetch(resultsUrl, {signal: ctrl.signal});
      clearTimeout(tmo);
      resultsResp = await res.json();
    } catch(e) {
      const msg = e.name === 'AbortError'
        ? 'League server did not respond within 2 minutes. Is the turn still running? Try again shortly.'
        : 'Could not reach league server: ' + e.message;
      fail(msg, 3); return;
    }
    if (!resultsResp.success) {
      fail(resultsResp.error || 'Server returned an error.', 3); return;
    }

    const turnNum    = resultsResp.turn;
    const teamResults= resultsResp.results || (resultsResp.result ? [resultsResp.result] : []);
    if (!teamResults.length && !resultsResp.has_newsletter) {
      fail('No results returned from server.', 3); return;
    }

    // ── Step 4: Apply each result locally via gui_server ──────────────────
    tick(4);
    const applied = []; const missed = [];

    // Build local name→id map from known teams
    const nameToId = {};
    Object.values(S.teams || {}).forEach(t => {
      if (t && t.team_name) nameToId[t.team_name.toLowerCase()] = t.team_id;
    });

    for (const result of teamResults) {
      // Match by team_id first, then team_name
      let localTid = null;
      const serverTid = result.team_id;
      const knownIds  = S.account?.team_ids || Object.keys(S.teams||{}).map(Number);
      if (serverTid && knownIds.includes(Number(serverTid))) {
        localTid = Number(serverTid);
      } else {
        localTid = nameToId[(result.team_name||'').toLowerCase()] || null;
      }

      if (!localTid) {
        missed.push(result.team_name || 'Unknown');
        continue;
      }

      const app = await API.post('/api/apply_league_results', {
        team_id: localTid, result,
      });
      if (app.success) {
        S.teams[localTid] = app.team;
        applied.push({ team_id: localTid, team_name: result.team_name || '?',
                       bouts: app.bouts, team: app.team });
      } else {
        missed.push(`${result.team_name || '?'}: ${app.error || '?'}`);
      }
    }

    tick(5); await new Promise(r => setTimeout(r, 50)); // Saving fight data

    // ── Step 6: Fetch newsletter directly from league server ──────────────
    tick(6);
    let newsletterSaved = false;
    if (resultsResp.has_newsletter && turnNum) {
      try {
        const nlUrl  = `${lg.url}/api/newsletter?turn=${turnNum}`;
        const nlRes  = await fetch(nlUrl);
        const nlData = await nlRes.json();
        if (nlData.success && nlData.newsletter) {
          await API.post('/api/newsletter/save', { turn: turnNum, text: nlData.newsletter });
          S.newsletters = null; S.newsletterText = null; S.newsletterTurn = null;
          newsletterSaved = true;
        }
      } catch(e) {
        console.warn('Newsletter fetch failed:', e.message);
      }
    }

    tick(7); await new Promise(r => setTimeout(r, 50)); // Finalising

    if (!applied.length && !resultsResp.has_newsletter) {
      fail('No results matched your local teams.' +
           (missed.length ? ' Unmatched: ' + missed.join(', ') : '') +
           '  Upload your teams first, then ask the host to run the turn.', 3);
      return;
    }

    _showDownloadProgress(_DL_STEPS, _DL_STEPS.length, null);

    // Turn downloaded — invalidate scout cache so locks clear on next view
    S.scout.loaded     = false;
    S.scout.selections = [];
    S.scout.slotsLeft  = 3;
    S.scout.targets    = null;
    S.scout.report     = null;

    const names  = applied.map(a => a.team_name).join(', ');
    const warn   = missed.length ? `  (${missed.length} unmatched: ${missed.join(', ')})` : '';
    const nlNote = newsletterSaved ? '  Newsletter ready.' : '';
    setMsg(`✓ Turn ${turnNum} downloaded for ${applied.length} team(s): ${names}${warn}${nlNote}`, 'ok');

    // Record download timestamp and turn number
    const lg2 = S.league;
    lg2.lastDownload = new Date().toLocaleString();
    lg2.lastTurnRan  = turnNum;
    await API.post('/api/league_settings', {
      manager_name: S.account?.manager_name || lg2.managerName || '',
      url: lg2.url, managerId: lg2.managerId, managerName: lg2.managerName, password: lg2.password,
      lastUpload: lg2.lastUpload, lastDownload: lg2.lastDownload, lastTurnRan: lg2.lastTurnRan,
    });

    if (applied.length >= 1) {
      S.sel  = {type: 'team', teamId: applied[0].team_id};
      S.wTab = 'fights';
    }
    render();

  } catch(e) {
    fail('Unexpected error: ' + e.message, 1);
  }
}

async function runAllTeams() {
  const ids = (S.account?.team_ids || []).filter(tid => S.runNextTurn[tid] !== false);
  if (!ids.length) { setMsg('No teams have "Run This Turn" checked.', 'err'); return; }
  setMsg(`Running ${ids.length} team(s)...`, 'ok'); render();
  const r = await API.post('/api/run_all_turns', {
    manager_id: S.account.id,
    team_ids: ids,
  });
  if (!r.success) { setMsg('Error: ' + r.error, 'err'); return; }

  for (const res of r.results || []) {
    if (res.success) {
      const t = await API.get('/api/team?id=' + res.team_id);
      if (t.success) S.teams[res.team_id] = t.team;
    }
  }
  const wins  = (r.results||[]).reduce((a,x)=>a+(x.bouts||[]).filter(b=>b.result==='WIN').length,0);
  const total = (r.results||[]).reduce((a,x)=>a+(x.bouts||[]).length,0);
  setMsg(`Turn ${r.turn_number} complete — ${wins}W/${total-wins}L across ${ids.length} team(s).`, 'ok');

  S.scout.loaded     = false;
  S.scout.selections = [];
  S.scout.slotsLeft  = 3;
  S.scout.targets    = null;
  S.scout.report     = null;

}
